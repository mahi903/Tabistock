<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>ログイン / 会員登録｜Tabistock</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#1f6f5b">
<script type="module" src="./auth-status.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:"Noto Sans JP",-apple-system,BlinkMacSystemFont,"Helvetica Neue","Yu Gothic",sans-serif;color:#182033;background:#f7f1e8;min-height:100vh}
  a{color:#1f6f5b}
  .top{display:flex;align-items:center;justify-content:space-between;padding:18px 6%}
  .logo{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Yu Gothic",sans-serif;font-size:26px;font-weight:900;letter-spacing:-0.04em;color:#1f6f5b;text-decoration:none}
  .wrap{max-width:440px;margin:30px auto 60px;padding:0 20px}
  .card{background:#fff;border:1px solid #e7ddcb;border-radius:18px;padding:28px 26px;box-shadow:0 10px 30px rgba(0,0,0,.05)}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:#6c7787;font-size:13px;margin:0 0 22px}
  .tabs{display:flex;gap:8px;margin-bottom:22px}
  .tabs button{flex:1;padding:11px;border:1px solid #e7ddcb;background:#faf6ee;border-radius:999px;font-weight:700;font-size:14px;cursor:pointer;color:#6c7787;font-family:inherit}
  .tabs button.on{background:#1f6f5b;color:#fff;border-color:#1f6f5b}
  label{display:block;font-size:12px;font-weight:700;color:#6c7787;margin:14px 0 6px}
  input{width:100%;padding:12px 14px;border:1px solid #e7ddcb;border-radius:12px;font-size:15px;font-family:inherit;outline:none;background:#fff;color:#182033}
  input:focus{border-color:#1f6f5b}
  .hint{font-size:11px;color:#9aa2af;margin:5px 0 0}
  .btn{width:100%;margin-top:20px;padding:13px;border:none;border-radius:999px;background:#e2683b;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
  .btn:disabled{opacity:.55;cursor:default}
  .msg{margin-top:16px;font-size:13px;padding:11px 14px;border-radius:10px;display:none}
  .msg.err{display:block;background:#fdecec;color:#b53d3d;border:1px solid #f3c9c9}
  .msg.ok{display:block;background:#e9f5ef;color:#1f6f5b;border:1px solid #bfe3d3}
  .hide{display:none}
  .me{background:transparent;border:none;border-radius:0;padding:0;text-align:center}
  .me .nick{font-size:20px;font-weight:800;margin:6px 0}
  .me .email{color:#6c7787;font-size:13px;margin:0 0 18px}
  .me .actions{display:flex;flex-direction:column;gap:10px}
  .me .actions a,.me .actions button{display:flex;align-items:center;justify-content:center;width:100%;padding:8px 14px;border-radius:999px;font-size:13px;font-weight:700;line-height:1;text-decoration:none;text-align:center;cursor:pointer;font-family:inherit;border:none}
  .a-main{background:#e2683b;color:#fff}
  .a-ghost{background:#faf6ee;color:#1f6f5b;border:1.5px solid #1f6f5b !important}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;margin-top:8px}
  .badge.warn{background:#fff3e6;color:#c4691f}
  .badge.ok{background:#e9f5ef;color:#1f6f5b}
  /* マイページ */
  .me{text-align:left}
  .profile{display:flex;align-items:center;gap:16px}
  .avatar-wrap{position:relative;flex-shrink:0}
  .avatar{width:84px;height:84px;border-radius:50%;background:#1f6f5b;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:#fff;font-size:34px;font-weight:800;border:3px solid #fff;box-shadow:0 4px 14px rgba(0,0,0,.12)}
  .avatar-edit{position:absolute;right:-2px;bottom:-2px;width:30px;height:30px;border-radius:50%;background:#e2683b;color:#fff;border:2px solid #fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;padding:0;line-height:1}
  .profile .pinfo{min-width:0;flex:1}
  .profile .pinfo .nick{font-size:20px;font-weight:800;margin:0 0 2px}
  .profile .pinfo .email{color:#6c7787;font-size:13px;margin:0;word-break:break-all}
  /* フォロー統計 */
  .stats{display:flex;gap:8px;margin-top:14px}
  .stats .stat{flex:1;text-align:center;background:#faf6ee;border:1px solid #e7ddcb;border-radius:12px;padding:9px 4px;font:inherit;color:inherit}
  button.stat{cursor:pointer;transition:background .15s}
  button.stat:hover{background:#f1ead9}
  .stats .stat strong{display:block;font-size:18px;font-weight:800;color:#182033;line-height:1.15}
  .stats .stat span{font-size:11.5px;color:#6c7787}
  /* フォロー一覧モーダル */
  .fmodal{position:fixed;inset:0;background:rgba(24,32,51,.45);display:none;align-items:flex-end;justify-content:center;z-index:1000}
  .fmodal.open{display:flex}
  .fmodal .sheet{background:#fff;width:100%;max-width:480px;max-height:78vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;animation:fsheet .22s ease}
  @media(min-width:520px){.fmodal{align-items:center}.fmodal .sheet{border-radius:18px}}
  @keyframes fsheet{from{transform:translateY(20px);opacity:.6}to{transform:none;opacity:1}}
  .fmodal .fhead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid #eee3d2}
  .fmodal .fhead h3{margin:0;font-size:15px;font-weight:800}
  .fmodal .fclose{background:none;border:none;font-size:22px;line-height:1;color:#6c7787;cursor:pointer;padding:0 4px}
  .fmodal .flist{overflow:auto;padding:8px 0}
  .frow{display:flex;align-items:center;gap:12px;padding:10px 18px;text-decoration:none;color:inherit}
  .frow:hover{background:#faf6ee}
  .frow .fav{width:42px;height:42px;border-radius:50%;background:#1f6f5b;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:800;flex-shrink:0}
  .frow .fnk{font-size:14px;font-weight:700}
  .fempty{color:#6c7787;font-size:13px;text-align:center;padding:34px 16px}
  .section-title{font-size:15px;font-weight:800;margin:26px 0 12px;display:flex;align-items:center;justify-content:space-between}
  .section-title .count{font-size:12px;color:#6c7787;font-weight:700}
  .posts{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:480px){.posts{grid-template-columns:1fr 1fr;gap:10px}}
  .pcard{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid #e7ddcb;border-radius:14px;overflow:hidden;transition:box-shadow .15s}
  .pcard:hover{box-shadow:0 6px 18px rgba(0,0,0,.08)}
  .pcard .pthumb{width:100%;height:108px;background-size:cover;background-position:center;background-color:#e7ddcb}
  .pcard .pbody{padding:10px 12px}
  .pcard .ptitle{font-size:13.5px;font-weight:700;margin:0 0 7px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .pcard .ppill{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:999px}
  .s-pending{background:#fff3e6;color:#c4691f}
  .s-published{background:#e9f5ef;color:#1f6f5b}
  .s-rejected{background:#fdecec;color:#b53d3d}
  .s-draft{background:#eef0f3;color:#5b6470}
  .s-hidden{background:#eceef1;color:#7a828d}
  .pcard .pbody .prow{display:flex;flex-direction:column;align-items:flex-start;gap:8px}
  .pcard .ppill{align-self:flex-start;white-space:nowrap}
  .pacts{display:flex;align-items:stretch;gap:6px;flex-wrap:nowrap;width:100%}
  .pacts > *{flex:1 1 0;justify-content:center;text-align:center;padding-left:4px;padding-right:4px}
  .pedit{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:#1f6f5b;text-decoration:none;border:1px solid #cfe3da;background:#f3faf7;padding:3px 10px;border-radius:999px;white-space:nowrap}
  .pedit:hover{background:#e6f3ed}
  .pbtn{display:inline-flex;align-items:center;font-size:11px;font-weight:700;border-radius:999px;padding:3px 10px;white-space:nowrap;cursor:pointer;background:#fff}
  .pbtn:disabled{opacity:.5;cursor:default}
  .pbtn-hide{color:#7a828d;border:1px solid #d4d8de}
  .pbtn-hide:hover{background:#f1f2f4}
  .pbtn-show{color:#1f6f5b;border:1px solid #cfe3da;background:#f3faf7}
  .pbtn-show:hover{background:#e6f3ed}
  .pbtn-del{color:#b53d3d;border:1px solid #f0cccc}
  .pbtn-del:hover{background:#fdf0f0}
  .posts-empty{grid-column:1/-1;color:#6c7787;font-size:13px;text-align:center;padding:26px 16px;border:1px dashed #e7ddcb;border-radius:14px}
  /* 設定行（トグル） */
  .setrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-top:1px solid #eee3d2;border-bottom:1px solid #eee3d2}
  .setlabel{font-size:14px;font-weight:700;color:#182033;line-height:1.3}
  .setnote{font-size:11px;color:#9aa2af;margin-top:2px}
  .toggle{position:relative;width:46px;height:27px;border-radius:999px;background:#d4cdbe;border:none;cursor:pointer;padding:0;flex-shrink:0;transition:background .2s}
  .toggle .knob{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .2s}
  .toggle.on{background:#1f6f5b}
  .toggle.on .knob{transform:translateX(19px)}
  .toggle:disabled{opacity:.45;cursor:default}
</style>
</head>
<body>
  <div class="top">
    <a class="logo" href="./index.html">Tabistock</a>
    <a href="./index.html" style="font-size:13px;text-decoration:none;color:#6c7787">← トップへ</a>
  </div>

  <div class="wrap">
    <!-- 認証判定中（ログイン画面のチラ見え防止） -->
    <div id="authLoading" style="text-align:center;padding:60px 16px;color:#9aa2af;font-size:13px">読み込み中…</div>

    <!-- 未ログイン -->
    <div class="card hide" id="authCard">
      <h1 id="formTitle">ログイン</h1>
      <p class="sub">旅程を投稿するにはアカウントが必要です。</p>

      <div class="tabs">
        <button id="tabLogin" class="on" type="button">ログイン</button>
        <button id="tabSignup" type="button">新規登録</button>
      </div>

      <!-- ニックネーム（登録時のみ） -->
      <div id="nickWrap" class="hide">
        <label for="nickname">ニックネーム（投稿者名）</label>
        <input id="nickname" type="text" autocomplete="nickname">
        <p class="hint">記事に表示される名前です。半角英数字推奨（あとで記事のID生成にも使います）。</p>
      </div>

      <label for="email">メールアドレス</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@example.com">

      <label for="password">パスワード</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="6文字以上">

      <button class="btn" id="submitBtn" type="button">ログイン</button>
      <p id="forgotWrap" style="text-align:center;margin:12px 0 0;font-size:13px">
        <a href="#" id="forgotLink" style="color:#1f6f5b;text-decoration:underline">パスワードを忘れた方</a>
      </p>
      <div class="msg" id="msg"></div>
    </div>

    <!-- ログイン済み（マイページ） -->
    <div class="me hide" id="meCard">
      <div class="profile">
        <div class="avatar-wrap">
          <div class="avatar" id="meAvatar">—</div>
          <button class="avatar-edit" id="avatarEditBtn" type="button" title="アイコンを変更">✎</button>
          <input type="file" id="avatarInput" accept="image/*" class="hide">
        </div>
        <div class="pinfo">
          <p class="nick" id="meNick">—</p>
          <p class="email" id="meEmail">—</p>
          <div id="verifyBadge"></div>
        </div>
      </div>

      <div class="stats">
        <div class="stat"><strong id="postStat">0</strong><span>投稿</span></div>
        <button class="stat" id="followerStat" type="button"><strong id="followerCount">0</strong><span>フォロワー</span></button>
        <button class="stat" id="followingStat" type="button"><strong id="followingCount">0</strong><span>フォロー</span></button>
      </div>

      <div class="actions" style="margin-top:18px;flex-direction:row;gap:10px">
        <button class="a-ghost" id="editToggleBtn" type="button" style="flex:1">プロフィールを編集</button>
        <a class="a-main" href="./post.html" style="flex:1">投稿する</a>
      </div>
      <div class="actions" style="margin-top:10px">
        <a class="a-ghost" href="./post-transit.html" style="flex:1">✈ トランジット記事を投稿する</a>
      </div>
      <div class="msg" id="avatarMsg" style="margin-top:12px"></div>

      <!-- プロフィール編集（ボタンで開閉・初期は非表示） -->
      <div id="editSection" class="hide">
        <div class="section-title">プロフィールを編集</div>
        <label for="editNick">ユーザーネーム（投稿者名）</label>
        <input id="editNick" type="text" maxlength="30" autocomplete="nickname">
        <p class="hint">記事や投稿者カードに表示される名前です。他の人と同じ名前は使えません。</p>
        <label for="bio">ひとこと自己紹介</label>
        <input id="bio" type="text" maxlength="60" placeholder="例：学生バックパッカー。アジア中心に旅してます">
        <label for="instagram">Instagram（任意）</label>
        <input id="instagram" type="text" placeholder="ユーザー名 または URL（例：mahiro.9.3）">
        <p class="hint">ここで設定した内容が、あなたが投稿した記事の「執筆者カード」に表示されます。</p>
        <button class="btn" id="saveProfileBtn" type="button" style="margin-top:14px">変更を保存</button>
        <div class="msg" id="profileMsg" style="margin-top:12px"></div>
      </div>

      <div class="section-title">自分の投稿 <span class="count" id="postCount"></span></div>
      <div id="myPosts" class="posts"></div>

      <div class="section-title">保存した投稿 <span class="count" id="savedCount"></span></div>
      <div id="savedPosts" class="posts"></div>

      <div class="setrow" style="margin-top:26px">
        <div>
          <div class="setlabel">プッシュ通知</div>
          <div class="setnote" id="pushNote"></div>
        </div>
        <button class="toggle" id="pushToggle" type="button" role="switch" aria-checked="false" aria-label="プッシュ通知の切り替え"><span class="knob"></span></button>
      </div>
      <div class="msg" id="pushMsg" style="margin-top:8px"></div>

      <p class="hint" id="uidLine" style="margin-top:18px;word-break:break-all"></p>

      <div class="actions" style="margin-top:18px">
        <button class="a-ghost" id="logoutBtn" type="button">ログアウト</button>
      </div>
    </div>
  </div>

  <!-- フォロー/フォロワー一覧モーダル -->
  <div class="fmodal" id="fModal">
    <div class="sheet">
      <div class="fhead">
        <h3 id="fTitle">フォロー</h3>
        <button class="fclose" id="fClose" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="flist" id="fList"></div>
    </div>
  </div>

<script type="module">
import { auth, db, storage } from "./firebase-config.js";
import {
  createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut,
  onAuthStateChanged, updateProfile, sendEmailVerification, sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, setDoc, getDoc, updateDoc, deleteDoc, serverTimestamp, collection, query, where, getDocs, getCountFromServer }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { ref as sRef, uploadBytes, getDownloadURL }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import { enablePush, disablePush, isPushSupported } from "./push.js";

const $ = id => document.getElementById(id);
const esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
let mode = "login"; // login | signup

function setMode(m){
  mode = m;
  $("tabLogin").classList.toggle("on", m==="login");
  $("tabSignup").classList.toggle("on", m==="signup");
  $("nickWrap").classList.toggle("hide", m!=="signup");
  $("formTitle").textContent = m==="login" ? "ログイン" : "新規登録";
  $("submitBtn").textContent = m==="login" ? "ログイン" : "登録する";
  $("password").autocomplete = m==="login" ? "current-password" : "new-password";
  $("forgotWrap").classList.toggle("hide", m!=="login");
  showMsg("", "");
}
$("tabLogin").onclick = () => setMode("login");
$("tabSignup").onclick = () => setMode("signup");

// パスワード再設定メール送信
$("forgotLink").onclick = async (e) => {
  e.preventDefault();
  const email = $("email").value.trim();
  if(!email){ showMsg("メールアドレスを入力してから「パスワードを忘れた方」を押してください。", "err"); return; }
  try{
    await sendPasswordResetEmail(auth, email);
    showMsg("パスワード再設定メールを送信しました。メールをご確認ください。", "ok");
  }catch(err){
    showMsg(jpError(err.code), "err");
  }
};

function showMsg(text, kind){
  const el = $("msg");
  el.className = "msg" + (kind ? " "+kind : "");
  el.textContent = text;
}

function jpError(code){
  const map = {
    "auth/invalid-email": "メールアドレスの形式が正しくありません。",
    "auth/missing-password": "パスワードを入力してください。",
    "auth/weak-password": "パスワードは6文字以上にしてください。",
    "auth/email-already-in-use": "このメールアドレスは既に登録されています。ログインしてください。",
    "auth/invalid-credential": "メールアドレスかパスワードが違います。",
    "auth/user-not-found": "アカウントが見つかりません。新規登録してください。",
    "auth/wrong-password": "パスワードが違います。",
    "auth/too-many-requests": "試行回数が多すぎます。しばらく待ってから再度お試しください。",
    "auth/network-request-failed": "通信エラーです。接続を確認してください。"
  };
  return map[code] || ("エラー：" + code);
}

$("submitBtn").onclick = async () => {
  const email = $("email").value.trim();
  const password = $("password").value;
  const nickname = $("nickname").value.trim();
  if(!email || !password){ showMsg("メールアドレスとパスワードを入力してください。", "err"); return; }
  if(mode==="signup" && !nickname){ showMsg("ニックネームを入力してください。", "err"); return; }

  $("submitBtn").disabled = true;
  showMsg(mode==="login" ? "ログイン中…" : "登録中…", "ok");
  try{
    if(mode==="signup"){
      // ニックネーム重複チェック（簡易）
      const dup = await getDocs(query(collection(db, "publicProfiles"), where("nickname", "==", nickname)));
      if(!dup.empty){
        showMsg("このニックネームは既に使われています。別の名前にしてください。", "err");
        $("submitBtn").disabled = false;
        return;
      }
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: nickname });
      await setDoc(doc(db, "users", cred.user.uid), {
        nickname, email, createdAt: serverTimestamp()
      });
      await setDoc(doc(db, "publicProfiles", cred.user.uid), {
        nickname, createdAt: serverTimestamp()
      }, { merge: true });
      try { await sendEmailVerification(cred.user); } catch(e){}
      await signOut(auth); // 認証が済むまでログイン状態にしない
      setMode("login");
      showMsg("確認メールを送信しました。メール内のリンクを開いて認証を完了してから、ログインしてください。", "ok");
    }else{
      const cred = await signInWithEmailAndPassword(auth, email, password);
      if(!cred.user.emailVerified){
        try { await sendEmailVerification(cred.user); } catch(e){} // 確認メールを再送
        await signOut(auth);
        showMsg("メールアドレスが未確認です。確認メールのリンクを開いて認証を完了してください。（確認メールを再送しました）", "err");
        return;
      }
    }
  }catch(err){
    showMsg(jpError(err.code), "err");
  }finally{
    $("submitBtn").disabled = false;
  }
};

$("logoutBtn").onclick = () => signOut(auth);

/* ===== プッシュ通知（トグル） ===== */
const PUSH_PREF = "tabistock_push"; // この端末での希望状態 "on" | "off"
function showPushMsg(text, kind){
  const el = $("pushMsg");
  el.className = "msg" + (kind ? " "+kind : "");
  el.textContent = text;
}
function setToggle(on){
  const t = $("pushToggle"); if(!t) return;
  t.classList.toggle("on", !!on);
  t.setAttribute("aria-checked", on ? "true" : "false");
}
async function updatePushUI(){
  const t = $("pushToggle"); if(!t) return;
  if(!(await isPushSupported())){
    t.disabled = true; setToggle(false);
    $("pushNote").textContent = "この端末は通知に対応していません";
    return;
  }
  const perm = (typeof Notification !== "undefined") ? Notification.permission : "denied";
  if(perm === "denied"){
    t.disabled = true; setToggle(false);
    $("pushNote").textContent = "ブラウザ設定で通知がブロックされています";
    return;
  }
  t.disabled = false;
  $("pushNote").textContent = "いいね・コメント・フォローをお知らせ";
  const on = (perm === "granted") && (localStorage.getItem(PUSH_PREF) !== "off");
  setToggle(on);
}
$("pushToggle").onclick = async () => {
  const t = $("pushToggle");
  const turningOn = !t.classList.contains("on");
  t.disabled = true;
  showPushMsg("設定中…", "ok");
  try{
    if(turningOn){
      await enablePush();
      localStorage.setItem(PUSH_PREF, "on");
      setToggle(true);
      showPushMsg("通知をオンにしました。", "ok");
    }else{
      await disablePush();
      localStorage.setItem(PUSH_PREF, "off");
      setToggle(false);
      showPushMsg("通知をオフにしました。", "ok");
    }
  }catch(e){
    showPushMsg(e.message || "設定に失敗しました。", "err");
    await updatePushUI(); // 失敗時は実状態に戻す
  }finally{
    const denied = (typeof Notification !== "undefined") && Notification.permission === "denied";
    t.disabled = denied || !(await isPushSupported());
  }
};

/* ===== アイコン ===== */
function setAvatar(url, nick){
  const a = $("meAvatar");
  if(url){
    a.style.backgroundImage = `url('${url}')`;
    a.textContent = "";
  }else{
    a.style.backgroundImage = "";

  }
}
function showAvatarMsg(text, kind){
  const el = $("avatarMsg");
  el.className = "msg" + (kind ? " "+kind : "");
  el.textContent = text;
}
// 正方形に中央クロップして縮小
function resizeSquare(file, size){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const s = Math.min(img.width, img.height);
      const sx = (img.width - s)/2, sy = (img.height - s)/2;
      const c = document.createElement("canvas");
      c.width = size; c.height = size;
      c.getContext("2d").drawImage(img, sx, sy, s, s, 0, 0, size, size);
      c.toBlob(b => b ? resolve(b) : reject(new Error("画像変換に失敗しました")), "image/jpeg", 0.85);
    };
    img.onerror = () => reject(new Error("画像を読み込めませんでした"));
    img.src = URL.createObjectURL(file);
  });
}
$("avatarEditBtn").onclick = () => $("avatarInput").click();
$("avatarInput").onchange = async () => {
  const f = $("avatarInput").files[0]; if(!f) return;
  const user = auth.currentUser; if(!user){ return; }
  showAvatarMsg("アイコンをアップロード中…", "ok");
  try{
    const blob = await resizeSquare(f, 256);
    const r = sRef(storage, `avatars/${user.uid}/avatar.jpg`);
    await uploadBytes(r, blob, { contentType: "image/jpeg" });
    const url = await getDownloadURL(r);
    await updateProfile(user, { photoURL: url });
    await setDoc(doc(db, "users", user.uid), { photoURL: url }, { merge: true });
    await setDoc(doc(db, "publicProfiles", user.uid), { photoURL: url }, { merge: true });
    setAvatar(url + (url.includes("?") ? "&" : "?") + "t=" + Date.now(), null); // キャッシュ回避
    showAvatarMsg("アイコンを更新しました。", "ok");
  }catch(err){
    console.error(err);
    showAvatarMsg("アップロードに失敗しました：" + (err.message || err), "err");
  }finally{
    $("avatarInput").value = "";
  }
};

/* ===== プロフィール（自己紹介・SNS）保存 ===== */
function showProfileMsg(text, kind){
  const el = $("profileMsg");
  el.className = "msg" + (kind ? " "+kind : "");
  el.textContent = text;
}
$("saveProfileBtn").onclick = async () => {
  const user = auth.currentUser; if(!user) return;
  const newNick = $("editNick").value.trim();
  const bio = $("bio").value.trim();
  const instagram = $("instagram").value.trim();
  if(!newNick){ showProfileMsg("ユーザーネームを入力してください。", "err"); return; }
  $("saveProfileBtn").disabled = true;
  showProfileMsg("保存中…", "ok");
  try{
    const curNick = $("meNick").textContent;
    // ニックネームが変わるときだけ重複チェック（自分自身は除外）
    if(newNick !== curNick){
      const dup = await getDocs(query(collection(db, "publicProfiles"), where("nickname", "==", newNick)));
      let taken = false;
      dup.forEach(d => { if(d.id !== user.uid) taken = true; });
      if(taken){
        showProfileMsg("このユーザーネームは既に使われています。別の名前にしてください。", "err");
        $("saveProfileBtn").disabled = false;
        return;
      }
      await updateProfile(user, { displayName: newNick });
    }
    // 公開プロフィールに名前・アイコンも同期（記事カード用）
    const pub = { bio, instagram, nickname: newNick };
    if(user.photoURL) pub.photoURL = user.photoURL;
    await setDoc(doc(db, "publicProfiles", user.uid), pub, { merge: true });
    await setDoc(doc(db, "users", user.uid), { bio, instagram, nickname: newNick }, { merge: true });
    $("meNick").textContent = newNick;
    showProfileMsg("プロフィールを保存しました。", "ok");
  }catch(err){
    console.error(err);
    showProfileMsg("保存に失敗しました：" + (err.message || err), "err");
  }finally{
    $("saveProfileBtn").disabled = false;
  }
};

/* ===== 自分の投稿一覧 ===== */
function renderPost(d, own){
  const thumb = d.thumbUrl || (d.heroUrls && d.heroUrls[0]) || "";
  const sc = d.status==="published" ? "s-published" : (d.status==="rejected" ? "s-rejected" : (d.status==="draft" ? "s-draft" : (d.status==="hidden" ? "s-hidden" : "s-pending")));
  const sl = d.status==="published" ? "公開中" : (d.status==="rejected" ? "却下" : (d.status==="draft" ? "下書き" : (d.status==="hidden" ? "非表示" : "承認待ち")));
  const editPage = d.type === "transit" ? "./post-transit.html" : "./post.html";
  let acts = "";
  if(own){
    acts += `<a class="pedit" href="${editPage}?edit=${esc(d.id)}">編集</a>`;
    if(d.status==="published"){
      acts += `<button type="button" class="pbtn pbtn-hide" data-act="hide" data-id="${esc(d.id)}">非表示</button>`;
    }else if(d.status==="hidden"){
      acts += `<button type="button" class="pbtn pbtn-show" data-act="show" data-id="${esc(d.id)}">再公開</button>`;
    }
    acts += `<button type="button" class="pbtn pbtn-del" data-act="delete" data-id="${esc(d.id)}">削除</button>`;
  }
  return `<div class="pcard">
    <a href="./articles/view.html?id=${esc(d.id)}" style="text-decoration:none;color:inherit;display:block">
      <div class="pthumb" style="background-image:url('${esc(thumb)}')"></div>
      <div class="pbody" style="padding-bottom:8px"><p class="ptitle" style="margin-bottom:0">${esc(d.title||"(無題)")}</p></div>
    </a>
    <div class="pbody" style="padding-top:0">
      <div class="prow"><span class="ppill ${sc}">${sl}</span><div class="pacts">${acts}</div></div>
    </div>
  </div>`;
}
async function loadMyPosts(uid){
  const box = $("myPosts");
  box.innerHTML = `<p class="posts-empty">読み込み中…</p>`;
  try{
    const snap = await getDocs(query(collection(db, "articles"), where("authorId", "==", uid)));
    const docs = [];
    snap.forEach(s => docs.push({ id: s.id, ...s.data() }));
    docs.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
    $("postCount").textContent = docs.length ? `${docs.length}件` : "";
    $("postStat").textContent = docs.filter(d => d.status === "published").length;
    if(!docs.length){
      box.innerHTML = `<p class="posts-empty">まだ投稿がありません。<br><a href="./post.html">最初の旅程を投稿する →</a></p>`;
      return;
    }
    box.innerHTML = docs.map(d => renderPost(d, true)).join("");
  }catch(err){
    console.error(err);
    box.innerHTML = `<p class="posts-empty">読み込みエラー：${esc(err.message||err)}</p>`;
  }
}

// 自分の投稿の操作（非表示／再公開／削除）。再公開は承認不要で即公開に戻す。
$("myPosts").addEventListener("click", async (e) => {
  const btn = e.target.closest("button[data-act]");
  if(!btn) return;
  const id = btn.dataset.id, act = btn.dataset.act;
  const uid = auth.currentUser && auth.currentUser.uid;
  if(!id || !uid) return;
  if(act === "delete" && !confirm("この投稿を削除しますか？この操作は取り消せません。")) return;
  btn.disabled = true;
  try{
    if(act === "hide"){
      await updateDoc(doc(db, "articles", id), { status: "hidden", updatedAt: serverTimestamp() });
    }else if(act === "show"){
      await updateDoc(doc(db, "articles", id), { status: "published", updatedAt: serverTimestamp() });
    }else if(act === "delete"){
      await deleteDoc(doc(db, "articles", id));
    }
    await loadMyPosts(uid);
  }catch(err){
    console.error(err);
    btn.disabled = false;
    alert("操作に失敗しました：" + (err.message || err));
  }
});

async function loadSavedPosts(uid){
  const box = $("savedPosts");
  box.innerHTML = `<p class="posts-empty">読み込み中…</p>`;
  try{
    const savesSnap = await getDocs(collection(db, "users", uid, "saves"));
    const entries = [];
    savesSnap.forEach(s => entries.push({ id: s.id, savedAt: s.data().savedAt }));
    entries.sort((a,b) => (b.savedAt?.seconds||0) - (a.savedAt?.seconds||0));
    // 各記事を取得（公開されている／読めるものだけ表示）
    const docs = [];
    for(const e of entries){
      try{
        const a = await getDoc(doc(db, "articles", e.id));
        if(a.exists()) docs.push({ id: a.id, ...a.data() });
      }catch(err){ /* 読めない記事はスキップ */ }
    }
    $("savedCount").textContent = docs.length ? `${docs.length}件` : "";
    if(!docs.length){
      box.innerHTML = `<p class="posts-empty">保存した投稿はありません。<br>記事ページの「保存」ボタンでここに追加されます。</p>`;
      return;
    }
    box.innerHTML = docs.map(d => renderPost(d, false)).join("");
  }catch(err){
    console.error(err);
    box.innerHTML = `<p class="posts-empty">読み込みエラー：${esc(err.message||err)}</p>`;
  }
}

/* ===== フォロー数・フォロー/フォロワー一覧 ===== */
async function loadFollowCounts(uid){

  }catch(e){ console.warn("フォロワー数の取得に失敗:", e); }

function closeFModal(){ $("fModal").classList.remove("open"); }
$("fClose").onclick = closeFModal;
$("fModal").addEventListener("click", e => { if(e.target.id === "fModal") closeFModal(); });

// type: "followers" | "following"
async function openFollowList(uid, type){
  $("fTitle").textContent = type === "followers" ? "フォロワー" : "フォロー";
  const list = $("fList");
  list.innerHTML = `<p class="fempty">読み込み中…</p>`;
  $("fModal").classList.add("open");
  try{
    const snap = await getDocs(collection(db, "users", uid, type));
    const ids = [];
    snap.forEach(s => ids.push(s.id));
    if(!ids.length){
      list.innerHTML = `<p class="fempty">${type === "followers" ? "まだフォロワーがいません。" : "まだ誰もフォローしていません。"}</p>`;
      return;
    }
    // 各ユーザーの公開プロフィールを取得
    const profiles = await Promise.all(ids.map(async id => {
      try{
        const p = await getDoc(doc(db, "publicProfiles", id));
        return { id, ...(p.exists() ? p.data() : {}) };
      }catch(e){ return { id }; }
    }));
    list.innerHTML = profiles.map(p => {
      const nick = p.nickname || "旅人";
      const photo = p.photoURL || "";
      const av = photo
        ? `<div class="fav" style="background-image:url('${esc(photo)}')"></div>`
        : `<div class="fav">${esc((String(nick).trim().charAt(0) || "?").toUpperCase())}</div>`;
      return `<a class="frow" href="./user.html?uid=${esc(p.id)}">${av}<span class="fnk">${esc(nick)}</span></a>`;
    }).join("");
  }catch(err){
    console.error(err);
    list.innerHTML = `<p class="fempty">読み込みに失敗しました。</p>`;
  }
}

onAuthStateChanged(auth, async (user) => {
  $("authLoading").classList.add("hide"); // 判定が出たらローディングを消す
  if(user && user.emailVerified){
    // プロフィール取得（nickname / photoURL）
    let nick = user.displayName || "";
    let photo = user.photoURL || "";
    try{
      const snap = await getDoc(doc(db, "users", user.uid));
      if(snap.exists()){
        const u = snap.data();
        if(u.nickname) nick = u.nickname;
        if(u.photoURL) photo = u.photoURL;
        $("bio").value = u.bio || "";
        $("instagram").value = u.instagram || "";
      }
    }catch(e){}
    $("authCard").classList.add("hide");
    $("meCard").classList.remove("hide");
    $("meNick").textContent = nick || "(名前未設定)";
    $("editNick").value = nick || "";
    $("meEmail").textContent = user.email;
    $("uidLine").textContent = "UID: " + user.uid;
    $("verifyBadge").innerHTML = user.emailVerified
      ? '<span class="badge ok">メール確認済み</span>'
      : '<span class="badge warn">メール未確認（受信ボックスを確認）</span>';
    setAvatar(photo, nick);
    loadMyPosts(user.uid);
    loadSavedPosts(user.uid);
    loadFollowCounts(user.uid);
    updatePushUI();
    // 既に許可済みで、かつ本人がオフにしていなければ、トークンを黙って更新（プロンプトは出ない）。
    if((typeof Notification !== "undefined") && Notification.permission === "granted"
       && localStorage.getItem(PUSH_PREF) !== "off"){
      enablePush().catch(() => {});
    }
    $("followerStat").onclick = () => openFollowList(user.uid, "followers");
    $("followingStat").onclick = () => openFollowList(user.uid, "following");
  }else{
    $("meCard").classList.add("hide");
    $("authCard").classList.remove("hide");
  }
});
