<style>
:root{
  --bg:#f6efe4;
  --ink:#1b2330;
  --green:#1f6f5b;
  --green-d:#175243;
  --terra:#e2683b;
  --sand:#e9dcc6;
  --muted:#6c7787;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Noto Sans JP",-apple-system,sans-serif;color:var(--ink);background:var(--bg);overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* ===== HEADER ===== */
.hd{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:20px 6%;transition:.4s ease}
.hd.scrolled{background:rgba(246,239,228,.85);backdrop-filter:blur(16px);padding:14px 6%;box-shadow:0 6px 24px rgba(0,0,0,.06)}
.hd .logo{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Yu Gothic",sans-serif;font-size:28px;font-weight:900;letter-spacing:-0.04em;color:#fff;transition:color .4s}
.hd.scrolled .logo{color:#1f6f5b}
.hd-r{display:flex;align-items:center;gap:14px}
.hd-search{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:8px 8px 8px 16px;transition:.4s}
.hd.scrolled .hd-search{background:#fff;border-color:#e7ddcb}
.hd-search input{background:none;border:none;outline:none;color:#fff;width:150px;font-size:13px}
.hd.scrolled .hd-search input{color:var(--ink)}
.hd-search input::placeholder{color:rgba(255,255,255,.8)}
.hd.scrolled .hd-search input::placeholder{color:var(--muted)}
.hd-search button{border:none;border-radius:999px;background:var(--green);color:#fff;width:34px;height:34px;cursor:pointer;font-size:14px}

/* ===== HAMBURGER ===== */
.burger{display:none;flex-direction:column;justify-content:center;gap:5px;width:44px;height:44px;border:none;background:none;cursor:pointer;padding:0}
.burger span{display:block;width:24px;height:2px;background:#fff;margin:0 auto;border-radius:2px;transition:.3s}
.hd.scrolled .burger span{background:#1b2330}
.burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0}
.burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.ovl{position:fixed;inset:0;background:rgba(15,20,28,.45);z-index:60;opacity:0;pointer-events:none;transition:.3s}
.ovl.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:-90%;width:84%;max-width:360px;height:100%;background:var(--bg);z-index:70;padding:80px 26px 28px;transition:right .35s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;box-shadow:-20px 0 50px rgba(0,0,0,.2);overflow-y:auto}
.drawer.open{right:0}
.drawer .dclose{position:absolute;top:20px;right:20px;border:none;background:none;font-size:28px;line-height:1;cursor:pointer;color:var(--ink)}
.drawer .dsearch{display:flex;gap:8px;align-items:center;background:#fff;border:1px solid #e7ddcb;border-radius:999px;padding:7px 7px 7px 16px;margin-bottom:10px}
.drawer .dsearch input{border:none;outline:none;background:none;flex:1;font-size:14px}
.drawer .dsearch button{border:none;border-radius:999px;background:var(--green);color:#fff;width:34px;height:34px;cursor:pointer;flex-shrink:0}
.drawer a.dlink{padding:16px 4px;font-size:17px;font-weight:700;border-bottom:1px solid #e7ddcb;display:flex;justify-content:space-between;align-items:center}
.drawer a.dlink em{font-style:normal;font-family:"Manrope",sans-serif;font-size:12px;letter-spacing:.1em;color:var(--terra)}
.drawer .dcta{padding-top:22px;margin-bottom:36px;display:flex;flex-direction:column;gap:10px}
.drawer .dcta .btn{width:100%;justify-content:center}
.drawer .btn-g{background:transparent;color:var(--green);border:1.5px solid var(--green)}
.drawer .btn-g:hover{background:var(--green);color:#fff}
.drawer .dtitle{font-size:18px;font-weight:800;margin:0 0 12px;color:var(--ink)}
.drawer .dq{width:100%;padding:12px 16px;border:1px solid #e7ddcb;border-radius:999px;background:#fff;font-size:14px;outline:none;font-family:inherit;margin-bottom:14px;color:var(--ink)}
.drawer .dfilter{display:flex;flex-direction:column;gap:11px;margin-bottom:16px}
.drawer .dfield{display:flex;flex-direction:column;gap:6px;font-size:12px;font-weight:700;color:var(--muted)}
.drawer .dfield select{font-size:14px;color:var(--ink);padding:11px 14px;border:1px solid #e7ddcb;border-radius:12px;background:#fff;font-family:inherit;cursor:pointer}
.drawer .dgo{width:100%;justify-content:center}
.drawer .dnav{margin-top:18px;border-top:1px solid #e7ddcb}
.drawer .dnav a.dlink{font-size:15px;padding:13px 4px}

.btn{padding:16px 30px;border-radius:999px;font-weight:800;font-size:15px;cursor:pointer;transition:.25s;display:inline-flex;align-items:center;gap:10px;border:none}
.btn-p{background:var(--terra);color:#fff}
.btn-p:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(226,104,59,.5)}

/* ===== MINI HERO ===== */
.fhero{position:relative;padding:150px 6% 70px;background:linear-gradient(150deg,#1f6f5b,#2f9e7f);color:#fff;overflow:hidden}
.fhero::after{content:"";position:absolute;right:-80px;top:-80px;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.07)}
.fhero .eyebrow{font-family:"Manrope",sans-serif;font-weight:800;letter-spacing:.22em;font-size:12px;text-transform:uppercase;color:#ffd9a0}
.fhero h1{font-size:clamp(28px,4.4vw,46px);font-weight:900;letter-spacing:-.02em;margin:12px 0 10px}
.fhero p{color:rgba(255,255,255,.9);font-size:15px;line-height:1.8;max-width:560px}

/* ===== FILTER BODY ===== */
.fwrap{max-width:1000px;margin:0 auto;padding:46px 6% 40px}
.fcard{background:#fff;border:1px solid #ece2d0;border-radius:20px;margin-bottom:16px;overflow:hidden;transition:box-shadow .3s}
.fcard.active{box-shadow:0 18px 40px rgba(27,35,48,.08)}
.fcard-head{padding:24px 28px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px}
.fcard-head .ft{display:flex;align-items:center;gap:16px}
.fcard-head .fnum{font-family:"Manrope",sans-serif;font-weight:800;font-size:15px;color:var(--terra);letter-spacing:.04em}
.fcard-head h3{font-size:18px;font-weight:800}
.fcard-head .fhint{font-size:12px;color:var(--muted);margin-top:3px}
.fcard-head .chev{flex-shrink:0;width:22px;height:22px;color:var(--muted);transition:transform .35s}
.fcard.active .chev{transform:rotate(180deg);color:var(--green)}
.fcount{font-size:11px;font-weight:800;color:#fff;background:var(--green);border-radius:999px;padding:3px 9px;display:none}
.fcount.show{display:inline-block}
.fpanel{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.2,.7,.2,1)}
.fpanel-in{padding:0 28px 28px}

.chips{display:flex;flex-wrap:wrap;gap:9px}
.chips label{display:inline-flex;align-items:center;border:1px solid #ddd2bf;border-radius:999px;padding:9px 17px;font-size:13.5px;cursor:pointer;transition:.2s;background:#faf6ee;user-select:none}
.chips label:hover{border-color:var(--green);color:var(--green)}
.chips label input{display:none}
.chips label:has(input:checked){background:var(--green);color:#fff;border-color:var(--green)}

.region-block{padding:18px 0;border-bottom:1px dashed #ece2d0}
.region-block:last-child{border-bottom:none}
.region-block .region-label{display:inline-flex;align-items:center;border:1.5px solid var(--terra);color:var(--terra);border-radius:999px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;margin-bottom:12px;user-select:none}
.region-block .region-label input{display:none}
.region-block .region-label:has(input:checked){background:var(--terra);color:#fff}
.country-list{display:flex;flex-wrap:wrap;gap:9px}

.style-section + .style-section{margin-top:22px;padding-top:22px;border-top:1px dashed #ece2d0}
.style-section .sub{font-size:12.5px;font-weight:800;color:var(--muted);letter-spacing:.04em;margin-bottom:12px}

/* ===== STICKY SUBMIT BAR ===== */
.fbar{position:sticky;bottom:0;z-index:30;display:flex;align-items:center;justify-content:center;gap:14px;padding:16px 6%;background:rgba(246,239,228,.94);backdrop-filter:blur(12px);border-top:1px solid #e7ddcb}
.fbar .selsum{font-size:13px;color:var(--muted);font-weight:600}
.fbar .selsum b{color:var(--green);font-weight:800}
.fbar .reset{background:none;border:none;color:var(--muted);font-size:13px;text-decoration:underline;cursor:pointer}
.fbar .go{background:var(--green);color:#fff}
.fbar .go:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(31,111,91,.4)}

@media(max-width:860px){
  .hd-search{display:none}
  .burger{display:flex}
  .fhero{padding:120px 6% 50px}
  .fcard-head{padding:20px 20px}
  .fpanel-in{padding:0 20px 24px}
  .fbar{flex-wrap:wrap;gap:10px}
  .fbar .selsum{order:-1;width:100%;text-align:center}
  .fbar .go{flex:1;justify-content:center}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hd" id="hd">
  <a class="logo" href="index.html">Tabistock</a>
  <div class="hd-r">
    <form class="hd-search" action="search.html" method="get"><input name="q" placeholder="旅先・キーワードで検索"><button type="submit">⌕</button></form>
    <button class="burger" id="burger" aria-label="メニューを開く"><span></span><span></span><span></span></button>
  </div>
</header>

<!-- MOBILE DRAWER -->
<div class="ovl" id="ovl"></div>
<nav class="drawer" id="drawer">
  <button class="dclose" id="dclose" aria-label="閉じる">×</button>
  <p class="dtitle">旅を検索</p>
  <input class="dq" id="dq" placeholder="旅先・キーワードで検索">
  <div class="dfilter">
    <label class="dfield">国・地域

    <label class="dfield">予算
      <select id="d-budget">

<script>
// header scroll
const hd=document.getElementById('hd');
addEventListener('scroll',()=>hd.classList.toggle('scrolled',scrollY>40));
// mobile drawer
const burger=document.getElementById('burger'),drawer=document.getElementById('drawer'),ovl=document.getElementById('ovl'),dclose=document.getElementById('dclose');
function toggleD(open){burger.classList.toggle('open',open);drawer.classList.toggle('open',open);ovl.classList.toggle('open',open);document.body.style.overflow=open?'hidden':''}
burger.addEventListener('click',()=>toggleD(!drawer.classList.contains('open')));
ovl.addEventListener('click',()=>toggleD(false));
dclose.addEventListener('click',()=>toggleD(false));
drawer.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>toggleD(false)));

// accordion
const cards=document.querySelectorAll('.fcard');
function openCard(card,open){
  const panel=card.querySelector('.fpanel');
  card.classList.toggle('active',open);
  panel.style.maxHeight=open?panel.scrollHeight+'px':'0px';
}
cards.forEach(card=>{
  card.querySelector('.fcard-head').addEventListener('click',()=>openCard(card,!card.classList.contains('active')));
});
// keep open panel sized correctly when inner checkboxes change layout
function refreshHeights(){cards.forEach(c=>{if(c.classList.contains('active')){const p=c.querySelector('.fpanel');p.style.maxHeight=p.scrollHeight+'px'}})}
addEventListener('resize',refreshHeights);

// open card matching URL hash (from index.html entry points)
const hash=location.hash.replace('#','');
const target=hash?document.getElementById(hash):document.getElementById('fc-country');
if(target&&target.classList.contains('fcard')){openCard(target,true);} else {openCard(cards[0],true);}

// selection count + per-card badges
const selN=document.getElementById('selN');
function updateCount(){
  let total=0;
  cards.forEach(card=>{
    const n=card.querySelectorAll('input:checked').length;
    total+=n;
    const badge=card.querySelector('.fcount');
    if(badge){badge.textContent=n;badge.classList.toggle('show',n>0)}
  });
  selN.textContent=total;
  refreshHeights();
}
document.querySelectorAll('.fcard input').forEach(i=>i.addEventListener('change',updateCount));
updateCount();

// reset
document.getElementById('reset').addEventListener('click',()=>{
  document.querySelectorAll('.fcard input:checked').forEach(i=>i.checked=false);
  updateCount();
});

// submit -> search.html?params
document.getElementById('go').addEventListener('click',()=>{
  const checked=document.querySelectorAll('.fcard input:checked');
  const params=new URLSearchParams();
  checked.forEach(i=>params.append(i.dataset.filter,i.value));
  window.location.href='search.html'+(params.toString()?('?'+params.toString()):'');
});
</script>
  <script>
  (function(){
    var dGo=document.getElementById('dGo'),dq=document.getElementById('dq');
    function go(){
      var p=new URLSearchParams();
      if(dq&&dq.value.trim())p.append('q',dq.value.trim());
      ['country','budget','days','style'].forEach(function(k){
        var el=document.getElementById('d-'+k);
        if(el&&el.value)p.append(k,el.value);
      });
      var qs=p.toString();
      window.location.href='search.html'+(qs?('?'+qs):'');
    }
    if(dGo)dGo.addEventListener('click',go);
    if(dq)dq.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();go();}});
  })();
  </script>
  <script type="module" src="./auth-status.js"></script>
