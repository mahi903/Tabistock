<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>管理（承認）｜Tabistock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:"Noto Sans JP",-apple-system,BlinkMacSystemFont,"Helvetica Neue","Yu Gothic",sans-serif;color:#182033;background:#f7f1e8}
  a{color:#1f6f5b}
  .top{display:flex;align-items:center;justify-content:space-between;padding:18px 6%}
  .logo{font-size:26px;font-weight:900;letter-spacing:-0.04em;color:#1f6f5b;text-decoration:none}
  .wrap{max-width:920px;margin:20px auto 80px;padding:0 20px}
  h1{font-size:24px;margin:0 0 4px}
  .sub{color:#6c7787;font-size:13px;margin:0 0 24px}
  .tabbar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .tabbar button{padding:9px 16px;border:1px solid #e7ddcb;background:#fff;border-radius:999px;font-weight:700;font-size:13px;cursor:pointer;color:#6c7787;font-family:inherit}
  .tabbar button.on{background:#1f6f5b;color:#fff;border-color:#1f6f5b}
  .item{display:flex;gap:16px;background:#fff;border:1px solid #e7ddcb;border-radius:16px;padding:16px;margin-bottom:14px;align-items:center}
  .thumb{width:120px;height:84px;border-radius:10px;background-size:cover;background-position:center;background-color:#e7ddcb;flex-shrink:0}
  .u-avatar{width:56px;height:56px;border-radius:50%;background:#1f6f5b;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:800;flex-shrink:0}
  .meta{flex:1;min-width:0}
  .meta h3{margin:0 0 4px;font-size:16px}
  .meta .who{font-size:12px;color:#6c7787;margin:0 0 4px}
  .meta .lead{font-size:13px;color:#48515f;margin:0;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .status-pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;margin-left:6px}
  .s-pending{background:#fff3e6;color:#c4691f}
  .s-published{background:#e9f5ef;color:#1f6f5b}
  .s-rejected{background:#fdecec;color:#b53d3d}
  .actions{display:flex;flex-direction:column;gap:8px;flex-shrink:0}
  .actions a,.actions button{display:block;text-align:center;padding:9px 14px;border-radius:999px;font-size:13px;font-weight:800;text-decoration:none;cursor:pointer;font-family:inherit;border:none;white-space:nowrap}
  .b-view{background:#faf6ee;color:#1f6f5b;border:1.5px solid #1f6f5b !important}
  .b-approve{background:#1f6f5b;color:#fff}
  .b-reject{background:#f3e6d6;color:#a06a1f}
  .b-del{background:#fdecec;color:#b53d3d}
  .empty{text-align:center;color:#6c7787;padding:50px 0}
  .note{font-size:13px;padding:11px 14px;border-radius:10px;margin:18px 0}
  .note.err{background:#fdecec;color:#b53d3d;border:1px solid #f3c9c9}
  .note.ok{background:#e9f5ef;color:#1f6f5b;border:1px solid #bfe3d3}
  @media(max-width:640px){ .item{flex-wrap:wrap} .thumb{width:100%;height:150px} .actions{flex-direction:row;width:100%;flex-wrap:wrap} .actions a,.actions button{flex:1} }
</style>
</head>
<body>
  <div class="top">
    <a class="logo" href="./index.html">Tabistock</a>
    <a href="./account.html" style="font-size:13px;text-decoration:none;color:#6c7787">アカウント</a>
  </div>

  <div class="wrap">
    <h1>投稿の管理</h1>
    <p class="sub">承認待ちの投稿を確認し、公開・却下・削除できます。（管理者のみ）</p>

    <div id="gate"></div>

    <div id="panel" style="display:none">
      <div class="tabbar">
        <button id="tab-pending" class="on" type="button">承認待ち</button>
        <button id="tab-published" type="button">公開中</button>
        <button id="tab-rejected" type="button">却下</button>
        <button id="tab-users" type="button" style="margin-left:auto">ユーザー</button>
      </div>
      <div id="msg"></div>
      <div id="list"><div class="empty">読み込み中…</div></div>
    </div>
  </div>

<script type="module">
import { auth, db } from "./firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, query, where, orderBy, getDocs, getDoc, doc, updateDoc, deleteDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const $ = id => document.getElementById(id);
let currentTab = "pending";

const esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function msg(text, kind){
  $("msg").innerHTML = text ? `<div class="note ${kind}">${esc(text)}</div>` : "";
}

async function loadList(){
  $("list").innerHTML = '<div class="empty">読み込み中…</div>';
  try{
    const qy = query(collection(db, "articles"), where("status","==",currentTab));
    const snap = await getDocs(qy);
    const docs = [];
    snap.forEach(s => docs.push({ id: s.id, ...s.data() }));
    // 新しい順（createdAt があれば）
    docs.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
    if(!docs.length){ $("list").innerHTML = `<div class="empty">該当する投稿はありません。</div>`; return; }
    $("list").innerHTML = docs.map(renderItem).join("");
    bindButtons();
  }catch(err){
    console.error(err);
    $("list").innerHTML = `<div class="empty">読み込みエラー：${esc(err.message||err)}</div>`;
  }
}

function renderItem(d){
  const thumb = d.thumbUrl || (d.heroUrls && d.heroUrls[0]) || "";
  const statusClass = d.status==="published" ? "s-published" : (d.status==="rejected" ? "s-rejected" : "s-pending");
  const statusLabel = d.status==="published" ? "公開中" : (d.status==="rejected" ? "却下" : "承認待ち");
  let actions = `<a class="b-view" href="./articles/view.html?id=${esc(d.id)}" target="_blank">プレビュー</a>`;
  if(d.status!=="published") actions += `<button class="b-approve" data-act="publish" data-id="${esc(d.id)}">公開する</button>`;
  if(d.status!=="rejected")  actions += `<button class="b-reject" data-act="reject" data-id="${esc(d.id)}">却下</button>`;
  actions += `<button class="b-del" data-act="delete" data-id="${esc(d.id)}">削除</button>`;
  return `<div class="item" id="row-${esc(d.id)}">
    <div class="thumb" style="background-image:url('${esc(thumb)}')"></div>
    <div class="meta">
      <h3>${esc(d.title||"(無題)")}<span class="status-pill ${statusClass}">${statusLabel}</span></h3>
      <p class="who">投稿者：${esc(d.authorNickname||"?")}</p>
      <p class="lead">${esc(d.lead||"")}</p>
    </div>
    <div class="actions">${actions}</div>
  </div>`;
}

function bindButtons(){
  document.querySelectorAll("[data-act]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = btn.dataset.id, act = btn.dataset.act;
      try{
        if(act==="publish"){
          await updateDoc(doc(db,"articles",id), { status:"published", updatedAt: serverTimestamp() });
          msg("公開しました。", "ok");
        }else if(act==="reject"){
          await updateDoc(doc(db,"articles",id), { status:"rejected", updatedAt: serverTimestamp() });
          msg("却下しました。", "ok");
        }else if(act==="delete"){
          if(!confirm("この投稿を完全に削除します。よろしいですか？")) return;
          await deleteDoc(doc(db,"articles",id));
          msg("削除しました。", "ok");
        }
        const row = $("row-"+id); if(row) row.remove();
        if(!document.querySelectorAll(".item").length) loadList();
      }catch(err){
        console.error(err);
        msg("操作に失敗しました：" + (err.message||err), "err");
      }
    });
  });
}

// ===== ユーザー一覧（公開情報のみ：メアド等は含まない）=====
function renderUser(d){
  const photo = d.photoURL || "";
  const nick = d.nickname || "(名前未設定)";
  const av = photo ? `style="background-image:url('${esc(photo)}')"` : '';
  const avInner = photo ? '' : (String(nick).trim().charAt(0) || "?").toUpperCase();
  const dt = d.createdAt?.seconds ? new Date(d.createdAt.seconds*1000).toLocaleDateString('ja-JP') : '';
  return `<div class="item">
    <div class="u-avatar" ${av}>${avInner}</div>
    <div class="meta">
      <h3>${esc(nick)}</h3>
      <p class="who">${dt ? '登録：'+dt : ''}</p>
      <p class="lead">${esc(d.bio||'')}</p>
    </div>
    <div class="actions">
      <a class="b-view" href="./user.html?uid=${esc(d.id)}" target="_blank">プロフィール</a>
    </div>
  </div>`;
}

async function loadUsers(){
  $("list").innerHTML = '<div class="empty">読み込み中…</div>';
  try{
    const snap = await getDocs(collection(db, "publicProfiles"));
    const docs = [];
    snap.forEach(s => docs.push({ id: s.id, ...s.data() }));
    docs.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
    if(!docs.length){ $("list").innerHTML = `<div class="empty">ユーザーがいません。</div>`; return; }
    $("list").innerHTML = `<p class="sub" style="margin:0 0 14px">登録ユーザー：${docs.length}人</p>` + docs.map(renderUser).join("");
  }catch(err){
    console.error(err);
    $("list").innerHTML = `<div class="empty">読み込みエラー：${esc(err.message||err)}</div>`;
  }
}

const TABS = ["pending","published","rejected","users"];
TABS.forEach(t => {
  $("tab-"+t).addEventListener("click", () => {
    currentTab = t;
    TABS.forEach(x => $("tab-"+x).classList.toggle("on", x===t));
    msg("", "");
    if(t==="users") loadUsers(); else loadList();
  });
});

onAuthStateChanged(auth, async (user) => {
  if(!user){
    $("gate").innerHTML = `<div class="note err">ログインが必要です。<a href="./account.html">ログインページへ</a></div>`;
    return;
  }
  // 管理者チェック
  let isAdmin = false;
  try{ const s = await getDoc(doc(db,"admins",user.uid)); isAdmin = s.exists(); }catch(e){}
  if(!isAdmin){
    $("gate").innerHTML = `<div class="note err">このアカウントには管理者権限がありません。</div>`;
    return;
  }
  $("gate").innerHTML = "";
  $("panel").style.display = "block";
  loadList();
});
</script>
  <!-- Vercel Web Analytics -->
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
