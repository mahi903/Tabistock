<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>メッセージ｜Tabistock</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#1f6f5b">
<script type="module" src="./auth-status.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:"Noto Sans JP",-apple-system,BlinkMacSystemFont,"Helvetica Neue","Yu Gothic",sans-serif;color:#182033;background:#f7f1e8;min-height:100%}
  a{color:#1f6f5b}

  /* 上部バー */
  .dm-top{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;background:rgba(247,241,232,.86);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-bottom:1px solid #e7ddcb}
  .dm-back{appearance:none;border:none;background:none;color:#182033;font-size:22px;line-height:1;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%}
  .dm-back:active{background:#ece3d3}
  .dm-top .dm-title{font-size:18px;font-weight:800;margin:0}
  .dm-peer{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;min-width:0}
  .dm-peer .av{width:38px;height:38px;border-radius:50%;background:#1f6f5b;background-size:cover;background-position:center;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
  .dm-peer .nm{font-size:16px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .wrap{max-width:620px;margin:0 auto}

  /* 受信箱 */
  .inbox{padding:8px 0 40px}
  .conv{display:flex;align-items:center;gap:13px;padding:14px 18px;text-decoration:none;color:inherit;border-bottom:1px solid #ece3d3}
  .conv:active{background:#f1e9da}
  .conv .av{width:52px;height:52px;border-radius:50%;background:#1f6f5b;background-size:cover;background-position:center;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;flex-shrink:0}
  .conv .cmid{min-width:0;flex:1}
  .conv .cnm{font-size:15px;font-weight:800;margin:0 0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conv .clast{font-size:13px;color:#6c7787;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conv.unread .clast{color:#182033;font-weight:700}
  .conv .cright{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
  .conv .ctime{font-size:11px;color:#9aa3b0}
  .conv .cbadge{min-width:20px;height:20px;padding:0 6px;border-radius:999px;background:#e2683b;color:#fff;font-size:11px;font-weight:800;display:none;align-items:center;justify-content:center}
  .conv.unread .cbadge{display:inline-flex}
  .empty{text-align:center;color:#6c7787;font-size:14px;padding:70px 24px;line-height:1.8}

  /* スレッド */
  .thread{display:flex;flex-direction:column;height:100dvh}
  .msgs{flex:1;overflow-y:auto;padding:16px 14px 12px;display:flex;flex-direction:column;gap:8px}
  .row{display:flex;max-width:78%}
  .row.me{align-self:flex-end;justify-content:flex-end}
  .row.you{align-self:flex-start}
  .bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
  .row.me .bubble{background:#1f6f5b;color:#fff;border-bottom-right-radius:6px}
  .row.you .bubble{background:#fff;color:#182033;border:1px solid #e7ddcb;border-bottom-left-radius:6px}
  .daysep{align-self:center;font-size:11px;color:#8a93a0;background:#ece3d3;padding:3px 12px;border-radius:999px;margin:8px 0}
  .msgs-empty{align-self:center;color:#9aa3b0;font-size:13px;padding:40px 20px;text-align:center}

  /* 入力バー */
  .composer{display:flex;align-items:flex-end;gap:8px;padding:10px 12px calc(env(safe-area-inset-bottom) + 10px);background:rgba(247,241,232,.92);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-top:1px solid #e7ddcb}
  .composer textarea{flex:1;resize:none;border:1px solid #e0d6c4;background:#fff;border-radius:20px;padding:10px 16px;font-family:inherit;font-size:15px;line-height:1.4;max-height:120px;outline:none}
  .composer textarea:focus{border-color:#1f6f5b}
  .send-btn{flex-shrink:0;width:42px;height:42px;border-radius:50%;border:none;background:#1f6f5b;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s,opacity .2s}
  .send-btn:active{transform:scale(.92)}
  .send-btn:disabled{opacity:.45;cursor:default}
  .send-btn svg{width:20px;height:20px}

  .center-msg{text-align:center;color:#6c7787;padding:80px 24px;font-size:14px;line-height:1.8}
</style>
</head>
<body>
  <div id="app" class="wrap"><p class="center-msg">読み込み中…</p></div>

<script type="module">
import { db, auth } from "./firebase-config.js";
import {
  doc, getDoc, setDoc, updateDoc, addDoc, collection, query, where,
  orderBy, onSnapshot, serverTimestamp, increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { sendNotification } from "./notify.js";

const app = document.getElementById("app");
const params = new URLSearchParams(location.search);
const toUid = params.get("to");

const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, m =>
  ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
const convIdOf = (a, b) => [a, b].sort().join("__");
const initial = (nm) => (String(nm || "").trim().charAt(0) || "?").toUpperCase();

// publicProfiles を簡易キャッシュ
const profCache = {};
async function getProfile(uid){
  if (profCache[uid]) return profCache[uid];
  let p = { nickname: "旅人", photoURL: "" };
  try{
    const s = await getDoc(doc(db, "publicProfiles", uid));
    if (s.exists()) p = { nickname: s.data().nickname || "旅人", photoURL: s.data().photoURL || "" };
  }catch(e){}
  profCache[uid] = p;
  return p;
}

const timeShort = (ts) => {
  if (!ts || !ts.seconds) return "";
  const d = new Date(ts.seconds * 1000);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return d.getHours() + ":" + String(d.getMinutes()).padStart(2, "0");
  return (d.getMonth() + 1) + "/" + d.getDate();
};
const dayLabel = (ts) => {
  if (!ts || !ts.seconds) return "";
  const d = new Date(ts.seconds * 1000);
  return d.getFullYear() + "年" + (d.getMonth() + 1) + "月" + d.getDate() + "日";
};

onAuthStateChanged(auth, (user) => {
  if (!user){
    app.innerHTML = `<p class="center-msg">メッセージを使うにはログインが必要です。<br><a href="./account.html">ログインする</a></p>`;
    return;
  }
  const me = user.uid;
  if (toUid && toUid !== me) openThread(me, toUid);
  else openInbox(me);
});

/* ============ 受信箱 ============ */
function openInbox(me){
  app.innerHTML = `
    <div class="dm-top"><button class="dm-back" id="back" aria-label="戻る">&larr;</button><h1 class="dm-title">メッセージ</h1></div>
    <div class="inbox" id="list"><p class="center-msg">読み込み中…</p></div>`;
  document.getElementById("back").onclick = () => history.length > 1 ? history.back() : (location.href = "./index.html");
  const listEl = document.getElementById("list");

  // array-contains だけで取得し、並び替えはクライアント側（複合インデックス不要）。
  const qy = query(collection(db, "conversations"), where("participants", "array-contains", me));
  onSnapshot(qy, async (snap) => {
    if (snap.empty){
      listEl.innerHTML = `<p class="empty">まだメッセージはありません。<br>気になる旅人のプロフィールから<br>メッセージを送ってみましょう。</p>`;
      return;
    }
    const docs = snap.docs.slice().sort((a, b) => {
      const ta = (a.data().updatedAt && a.data().updatedAt.seconds) || 0;
      const tb = (b.data().updatedAt && b.data().updatedAt.seconds) || 0;
      return tb - ta;
    });
    const rows = [];
    for (const docu of docs){
      const c = docu.data();
      const other = (c.participants || []).find(u => u !== me) || me;
      const prof = await getProfile(other);
      const unread = (c.unread && c.unread[me]) || 0;
      const avStyle = prof.photoURL ? `style="background-image:url('${esc(prof.photoURL)}')"` : "";
      const avInner = prof.photoURL ? "" : initial(prof.nickname);
      const lastMine = c.lastSenderId === me;
      const last = (lastMine ? "あなた: " : "") + (c.lastMessage || "");
      rows.push(
        `<a class="conv ${unread ? "unread" : ""}" href="./dm.html?to=${encodeURIComponent(other)}">` +
          `<div class="av" ${avStyle}>${avInner}</div>` +
          `<div class="cmid"><p class="cnm">${esc(prof.nickname)}</p><p class="clast">${esc(last)}</p></div>` +
          `<div class="cright"><span class="ctime">${timeShort(c.updatedAt)}</span>` +
          `<span class="cbadge">${unread > 99 ? "99+" : unread}</span></div>` +
        `</a>`
      );
    }
    listEl.innerHTML = rows.join("");
  }, (err) => {
    console.warn("受信箱の購読に失敗:", err);
    listEl.innerHTML = `<p class="empty">読み込みに失敗しました。<br>時間をおいて再度お試しください。</p>`;
  });
}

/* ============ スレッド（個別チャット） ============ */
async function openThread(me, other){
  const cid = convIdOf(me, other);
  const convRef = doc(db, "conversations", cid);
  const prof = await getProfile(other);
  const avStyle = prof.photoURL ? `style="background-image:url('${esc(prof.photoURL)}')"` : "";
  const avInner = prof.photoURL ? "" : initial(prof.nickname);

  app.innerHTML = `
    <div class="thread">
      <div class="dm-top">
        <button class="dm-back" id="back" aria-label="戻る">&larr;</button>
        <a class="dm-peer" href="./user.html?uid=${encodeURIComponent(other)}">
          <div class="av" ${avStyle}>${avInner}</div>
          <span class="nm">${esc(prof.nickname)}</span>
        </a>
      </div>
      <div class="msgs" id="msgs"><p class="msgs-empty">メッセージを読み込み中…</p></div>
      <form class="composer" id="composer">
        <textarea id="input" rows="1" placeholder="メッセージを入力" maxlength="2000"></textarea>
        <button class="send-btn" id="send" type="submit" disabled aria-label="送信">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
        </button>
      </form>
    </div>`;

  // 来たページ（プロフィール or 一覧）へ戻る。履歴が無ければ一覧へ。
  document.getElementById("back").onclick = () =>
    history.length > 1 ? history.back() : (location.href = "./dm.html");
  const msgsEl = document.getElementById("msgs");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const form = document.getElementById("composer");

  // 会話ドキュメントを確実に用意（存在チェックの getDoc は、未作成だと
  // ルール上「参加者判定」できず拒否されるため使わない）。
  // setDoc + merge なら：未作成→作成（participants 2人・自分含む）、
  // 既存→マージ更新。unread はマップなので自分の分だけ 0 にマージされる。
  try{
    await setDoc(convRef, {
      participants: [me, other].sort(),
      unread: { [me]: 0 }
    }, { merge: true });
  }catch(e){ console.warn("会話の初期化に失敗:", e); }

  // テキストエリアの自動リサイズ＋送信可否
  const autosize = () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
    sendBtn.disabled = input.value.trim().length === 0;
  };
  input.addEventListener("input", autosize);
  // PCでは Enter 送信 / Shift+Enter 改行（スマホは改行優先のため適用しない）
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey && window.matchMedia("(min-width:768px)").matches){
      e.preventDefault(); form.requestSubmit();
    }
  });

  // メッセージ購読
  const mq = query(collection(convRef, "messages"), orderBy("createdAt", "asc"));
  let firstLoad = true;
  onSnapshot(mq, (snap) => {
    if (snap.empty){
      msgsEl.innerHTML = `<p class="msgs-empty">最初のメッセージを送ってみましょう。</p>`;
      return;
    }
    let html = "", lastDay = "";
    snap.forEach(s => {
      const m = s.data();
      const day = dayLabel(m.createdAt);
      if (day && day !== lastDay){ html += `<div class="daysep">${day}</div>`; lastDay = day; }
      const mine = m.senderId === me;
      html += `<div class="row ${mine ? "me" : "you"}"><div class="bubble">${esc(m.text)}</div></div>`;
    });
    msgsEl.innerHTML = html;
    // 最新へスクロール
    requestAnimationFrame(() => { msgsEl.scrollTop = msgsEl.scrollHeight; });
    // 受信したら自分の未読を消す（画面を開いている＝既読）
    updateDoc(convRef, { ["unread." + me]: 0 }).catch(() => {});
    firstLoad = false;
  }, (err) => {
    console.warn("メッセージの購読に失敗:", err);
    msgsEl.innerHTML = `<p class="msgs-empty">読み込みに失敗しました。</p>`;
  });

  // 送信
  let sending = false;
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text || sending) return;
    sending = true; sendBtn.disabled = true;
    input.value = ""; autosize();
    try{
      await addDoc(collection(convRef, "messages"), {
        senderId: me, text, createdAt: serverTimestamp()
      });
      await updateDoc(convRef, {
        lastMessage: text.slice(0, 200),
        lastSenderId: me,
        updatedAt: serverTimestamp(),
        ["unread." + other]: increment(1),
        ["unread." + me]: 0
      });
      sendNotification({ toUid: other, type: "dm" });
    }catch(err){
      console.error("送信に失敗:", err);
      input.value = text; autosize();
      alert("メッセージの送信に失敗しました。");
    }finally{
      sending = false; sendBtn.disabled = input.value.trim().length === 0;
      input.focus();
    }
  });
}
</script>
</body>
</html>
