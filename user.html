<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>プロフィール｜Tabistock</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#1f6f5b">
<script type="module" src="./auth-status.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:"Noto Sans JP",-apple-system,BlinkMacSystemFont,"Helvetica Neue","Yu Gothic",sans-serif;color:#182033;background:#f7f1e8;min-height:100vh}
  a{color:#1f6f5b}
  .top{display:flex;align-items:center;justify-content:space-between;padding:18px 6%}
  .logo{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Yu Gothic",sans-serif;font-size:28px;font-weight:900;letter-spacing:-0.04em;color:#1f6f5b;text-decoration:none}
  .wrap{max-width:560px;margin:24px auto 60px;padding:0 20px}
  .me{background:#fff;border:1px solid #e7ddcb;border-radius:18px;padding:26px;text-align:left}
  .profile{display:flex;align-items:center;gap:16px}
  .avatar{width:84px;height:84px;border-radius:50%;background:#1f6f5b;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:#fff;font-size:34px;font-weight:800;border:3px solid #fff;box-shadow:0 4px 14px rgba(0,0,0,.12);flex-shrink:0}
  .pinfo{min-width:0;flex:1}
  .pinfo .nick{font-size:21px;font-weight:800;margin:0;display:inline-flex;align-items:center;gap:6px}
  .admin-badge{color:#1f6f5b;font-size:.78em;flex-shrink:0}
  .stats{display:flex;gap:26px;margin-top:14px}
  .stats div{text-align:center}
  .stats strong{display:block;font-size:18px;font-weight:800;color:#182033;line-height:1.15}
  .stats span{font-size:11.5px;color:#6c7787}
  .bio{color:#3c4654;font-size:14px;margin:16px 0 0;line-height:1.6;word-break:break-word}
  .actions{display:flex;gap:8px;margin-top:16px}
  .follow-btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;font-size:14px;font-weight:700;line-height:1;padding:11px 18px;border-radius:999px;background:#1f6f5b;color:#fff;border:1.5px solid #1f6f5b;cursor:pointer;transition:transform .15s,background .2s,color .2s}
  .follow-btn i{font-size:12px}
  .follow-btn:hover{background:#185645}
  .follow-btn:active{transform:scale(.96)}
  .follow-btn.following{background:#fff;color:#1f6f5b}
  .edit-link{flex:1;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;text-decoration:none;color:#1f6f5b;background:#faf6ee;border:1.5px solid #1f6f5b;border-radius:999px;padding:11px 18px}
  .socials{margin-top:16px}
  .socials a{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:#faf6ee;border:1px solid #e7ddcb;color:#1f6f5b;font-size:20px;text-decoration:none}
  .section-title{font-size:15px;font-weight:800;margin:26px 0 12px;display:flex;align-items:center;justify-content:space-between}
  .section-title .count{font-size:12px;color:#6c7787;font-weight:700}
  .posts{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:480px){.posts{grid-template-columns:1fr}}
  .pcard{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid #e7ddcb;border-radius:14px;overflow:hidden;transition:box-shadow .15s}
  .pcard:hover{box-shadow:0 6px 18px rgba(0,0,0,.08)}
  .pcard .pthumb{width:100%;height:108px;background-size:cover;background-position:center;background-color:#e7ddcb}
  .pcard .pbody{padding:10px 12px}
  .pcard .ptitle{font-size:13.5px;font-weight:700;margin:0;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .posts-empty{grid-column:1/-1;color:#6c7787;font-size:13px;text-align:center;padding:26px 16px;border:1px dashed #e7ddcb;border-radius:14px}
  .loading{color:#6c7787;font-size:14px;text-align:center;padding:60px 20px}
</style>
</head>
<body>
  <div class="top">
    <a class="logo" href="./index.html">Tabistock</a>
    <a href="javascript:history.back()" style="font-size:13px;text-decoration:none;color:#6c7787">← 戻る</a>
  </div>

  <div class="wrap">
    <div id="profileRoot">
      <p class="loading">読み込み中…</p>
    </div>
  </div>

<script type="module">
import { db, auth } from "./firebase-config.js";
import { doc, getDoc, setDoc, deleteDoc, collection, query, where, getDocs, getCountFromServer, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { sendNotification } from "./notify.js";

const esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const root = document.getElementById("profileRoot");
const uid = new URLSearchParams(location.search).get("uid");

function showError(msg){
  root.innerHTML = `<div class="me" style="text-align:center">
    <h1 style="font-size:20px;margin:0 0 10px">プロフィールが見つかりません</h1>
    <p style="color:#6c7787;font-size:14px">${esc(msg)}</p>
    <p style="margin-top:18px"><a href="./search.html" style="font-weight:700">旅を探す →</a></p>
  </div>`;
}

function igUrlOf(ig){
  const s = String(ig||"").trim();
  if(!s) return "";
  return /^https?:\/\//.test(s) ? s : ("https://www.instagram.com/" + s.replace(/^@/,"") + "/");
}

function renderPost(d){
  const thumb = d.thumbUrl || (d.heroUrls && d.heroUrls[0]) || "";
  return `<a class="pcard" href="./articles/view.html?id=${esc(d.id)}">
    <div class="pthumb" style="background-image:url('${esc(thumb)}')"></div>
    <div class="pbody"><p class="ptitle">${esc(d.title||"(無題)")}</p></div>
  </a>`;
}

(async () => {
  if(!uid){ showError("ユーザーが指定されていません。"); return; }
  try{
    const ps = await getDoc(doc(db, "publicProfiles", uid));
    const p = ps.exists() ? ps.data() : {};
    const nick = p.nickname || "旅人";
    const bio = p.bio || "旅程を投稿しています。";
    const photo = p.photoURL || "";
    const ig = igUrlOf(p.instagram);

    // 管理者バッジ
    let isAdmin = false;
    try{ isAdmin = (await getDoc(doc(db, "admins", uid))).exists(); }catch(e){}
    const badge = isAdmin ? ' <i class="fa-solid fa-circle-check admin-badge" title="管理者"></i>' : '';

    const avatarInner = photo
      ? ''
      : (String(nick).trim().charAt(0) || "?").toUpperCase();
    const avatarStyle = photo ? `style="background-image:url('${esc(photo)}')"` : '';

    root.innerHTML = `<div class="me">
      <div class="profile">
        <div class="avatar" ${avatarStyle}>${avatarInner}</div>
        <div class="pinfo">
          <p class="nick">${esc(nick)}${badge}</p>
          <div class="stats">
            <div><strong id="postStat">0</strong><span>投稿</span></div>
            <div><strong id="followerCount">0</strong><span>フォロワー</span></div>
            <div><strong id="followingCount">0</strong><span>フォロー</span></div>
          </div>
        </div>
      </div>
      <p class="bio">${esc(bio)}</p>
      <div class="actions" id="actionSlot"></div>
      ${ig ? `<div class="socials"><a href="${esc(ig)}" target="_blank" rel="noopener" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a></div>` : ''}
      <div class="section-title">投稿 <span class="count" id="postCount"></span></div>
      <div id="posts" class="posts"><p class="posts-empty">読み込み中…</p></div>
    </div>`;

    document.title = nick + "｜Tabistock";

    // フォロー数・フォロワー数
    const refreshFollowCounts = async () => {
      try{
        const fr = await getCountFromServer(collection(db, "users", uid, "followers"));
        document.getElementById("followerCount").textContent = fr.data().count;
      }catch(e){ console.warn("フォロワー数の取得に失敗:", e); }
      try{
        const fg = await getCountFromServer(collection(db, "users", uid, "following"));
        document.getElementById("followingCount").textContent = fg.data().count;
      }catch(e){ console.warn("フォロー数の取得に失敗:", e); }
    };
    refreshFollowCounts();

    // フォローボタン（ログイン中の他ユーザーのみ）
    const slot = document.getElementById("actionSlot");
    onAuthStateChanged(auth, async (user) => {
      const me = user ? user.uid : null;
      if(me && me === uid){
        slot.innerHTML = '<a class="edit-link" href="./account.html">プロフィールを編集</a>';
        return;
      }
      let following = false;
      if(me){ try{ following = (await getDoc(doc(db,"users",me,"following",uid))).exists(); }catch(e){} }
      slot.innerHTML = '<button class="follow-btn" id="followBtn" type="button">'
        + '<i class="fa-solid fa-plus"></i><span>フォロー</span></button>';
      const btn = document.getElementById("followBtn");
      let busy = false;
      const paint = () => {
        btn.classList.toggle("following", following);
        btn.querySelector("span").textContent = following ? "フォロー中" : "フォロー";
        btn.querySelector("i").className = following ? "fa-solid fa-check" : "fa-solid fa-plus";
      };
      paint();
      btn.addEventListener("click", async () => {
        if(busy) return;
        if(!me){ alert("フォローするにはログインが必要です。"); location.href = "./account.html"; return; }
        busy = true;
        try{
          if(following){
            await deleteDoc(doc(db,"users",me,"following",uid));
            await deleteDoc(doc(db,"users",uid,"followers",me));
            following = false;
          }else{
            await setDoc(doc(db,"users",me,"following",uid), { createdAt: serverTimestamp() });
            await setDoc(doc(db,"users",uid,"followers",me), { createdAt: serverTimestamp() });
            following = true;
            sendNotification({ toUid: uid, type: "follow" });
          }
          paint();
          await refreshFollowCounts();
        }catch(e){ console.error(e); }
        finally{ busy = false; }
      });
    });

    // 公開記事のみ取得（status=='published'）
    const box = document.getElementById("posts");
    try{
      const snap = await getDocs(query(
        collection(db, "articles"),
        where("authorId", "==", uid),
        where("status", "==", "published")
      ));
      const docs = [];
      snap.forEach(s => docs.push({ id: s.id, ...s.data() }));
      docs.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
      document.getElementById("postStat").textContent = docs.length;
      document.getElementById("postCount").textContent = docs.length ? `${docs.length}件` : "";
      box.innerHTML = docs.length
        ? docs.map(renderPost).join("")
        : `<p class="posts-empty">まだ公開された投稿はありません。</p>`;
    }catch(err){
      console.error(err);
      box.innerHTML = `<p class="posts-empty">投稿を読み込めませんでした。</p>`;
    }
  }catch(err){
    console.error(err);
    showError("読み込み中にエラーが発生しました。");
  }
})();
</script>
  <!-- Vercel Web Analytics -->
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
