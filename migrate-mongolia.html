<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>記事移行（モンゴル）｜Tabistock</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Yu Gothic",sans-serif;color:#182033;background:#f7f1e8;padding:40px 20px;line-height:1.7}
  .wrap{max-width:680px;margin:0 auto}
  h1{font-size:22px;margin:0 0 6px}
  .sub{color:#6c7787;font-size:13px;margin:0 0 24px}
  .card{background:#fff;border:1px solid #e7ddcb;border-radius:16px;padding:22px;margin-bottom:18px}
  .card h2{font-size:16px;margin:0 0 8px}
  .card p{font-size:13px;color:#48515f;margin:0 0 14px}
  button{font-family:inherit;font-weight:800;font-size:14px;padding:12px 22px;border-radius:999px;border:none;cursor:pointer}
  .b-go{background:#1f6f5b;color:#fff}
  .b-del{background:#fdecec;color:#b53d3d;border:1.5px solid #f3c9c9}
  button:disabled{opacity:.5;cursor:not-allowed}
  .note{font-size:13px;padding:11px 14px;border-radius:10px;margin-top:14px;display:none}
  .note.show{display:block}
  .note.err{background:#fdecec;color:#b53d3d;border:1px solid #f3c9c9}
  .note.ok{background:#e9f5ef;color:#1f6f5b;border:1px solid #bfe3d3}
  a{color:#1f6f5b}
  code{background:#f3ede1;padding:2px 6px;border-radius:6px;font-size:12px}
</style>
</head>
<body>
  <div class="wrap">
    <h1>記事移行ツール（モンゴル）</h1>
    <p class="sub">管理者専用。静的記事をFirestoreの動的記事に変換します。作業後はこのファイルを削除してください。</p>

    <div id="gate" class="note err show">読み込み中…</div>

    <div id="panel" style="display:none">
      <div class="card">
        <h2>① モンゴル記事を作成</h2>
        <p>mahiro名義で「モンゴル5泊6日｜大学生ひとり旅」を作成し、公開状態にします。画像は <code>/images/mongolia/</code> を使用。</p>
        <button class="b-go" id="createBtn" type="button">モンゴル記事を作成して公開</button>
        <div class="note" id="createMsg"></div>
      </div>

      <div class="card">
        <h2>② 中国（テスト）記事を削除</h2>
        <p>doc <code>ZMyfpTdnoRVsKMzfaP9c</code> を完全に削除します。</p>
        <button class="b-del" id="delBtn" type="button">中国記事を削除</button>
        <div class="note" id="delMsg"></div>
      </div>
    </div>
  </div>

<script type="module">
import { auth, db } from "./firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, doc, getDoc, getDocs, query, where, setDoc, updateDoc, deleteDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const $ = id => document.getElementById(id);
function show(el, text, kind){ el.className = "note show " + kind; el.textContent = text; }

const AUTHOR_ID = "aete3scQbPQMlYtKaKDNf4nUKk23";
const TITLE = "モンゴル5泊6日｜大学生ひとり旅";
const IMG = "/images/mongolia";

const articleData = {
  authorId: AUTHOR_ID,
  authorNickname: "mahiro",
  countries: ["mongolia"],
  region: "east-asia",
  budget: "20",
  days_v: "1w",
  styles: ["solo", "nature"],
  title: TITLE,
  lead: "20歳大学生、1人旅、関西国際空港発。ウランバートル・ダランザドガド・バヤンザグ・ヨリーンアム渓谷を巡る、現地ツアー利用・現地手配ありの旅",
  dateStart: "2025-03-30",
  dateEnd: "2025-04-06",
  currency: "モンゴルトゥグルグ",
  language: "モンゴル語",
  safety: "比較的安全",
  difficulty: 3,
  costs: { flight: 60000, stay: 10000, food: 10000, transit: 7000, tour: 64000, sightseeing: 0, esim: 0, souvenir: 3000 },
  flights: [
    { route: "大阪 → 上海 → ウランバートル", airline: "Spring Airlines", price: 30000 },
    { route: "ウランバートル → ソウル → 大阪", airline: "Jeju Air / Peach", price: 30000 }
  ],
  flightWhen: "出発の2ヶ月前",
  flightSite: "Trip.com",
  services: [
    { label: "宿泊", items: ["Booking.com", "Agoda"] },
    { label: "現地ツアー", items: ["GetYourGuide", "ツォクトモンゴル乗馬ツアー"] },
    { label: "eSIM", items: ["au海外放題"] },
    { label: "地図・交通", items: ["Google Maps", "UBCab"] },
    { label: "決済", items: ["現金", "VISA"] },
    { label: "翻訳・その他", items: ["Google翻訳"] }
  ],
  comment: "4月でも朝晩はかなり寒いので、防寒着は必須です。ウランバートルは想像以上に都会でしたが、郊外に出ると一気に自然が広がります。羊肉が苦手な人は少し覚悟しておくといいと思います。英語はほとんど通じません。電波が通じないところも郊外では多いので、ポケットモンゴル語辞典を持っておくのがおすすめです！\n\n現地ツアーは宿の方とWhatsappで直接交渉して手配してもらいました。",
  heroUrls: [`${IMG}/hero1.jpg`, `${IMG}/hero2.jpg`, `${IMG}/hero3.jpg`, `${IMG}/hero4.jpg`],
  thumbUrl: `${IMG}/hero1.jpg`,
  days: [
    {
      date: "3/30-31",
      summary: "上海経由でウランバートルへ",
      text: "3月30日の22時半、関西国際空港を出発し、翌真夜中上海着。空港泊をする人が多く、ソファやベンチは埋まっている。なんとかスペースを見つけて夜を明かす。Trip.comの無料券でラウンジを利用。\n\n早朝出発。お昼にチンギスハーン国際空港着。ATMで現金を下ろし、バスに乗って市内へ。700円くらいだった。外は5℃くらい。寒すぎる。\n\n市内は予想以上に都会。ビルが立ち並ぶ。メイン広場スフバートル広場到着。街のコンビニは韓国系のNice to CU。ホテルにチェックインし、散策してレストランに入る。マトンのステーキとポテト。美味しいけど油がすごい!",
      photoUrls: [`${IMG}/day1-1.jpg`, `${IMG}/day1-2.jpg`, `${IMG}/day1-3.jpg`, `${IMG}/day1-4.jpg`]
    },
    {
      date: "4/1",
      summary: "ダランザドガドへ移動",
      text: "バスや乗合いバンの発着点、ドラゴンバスターミナルへバスで向かう。渋滞がひどい。Whatsappで事前に手配していたため、バンはすぐ見つかる。しかし一定人数乗せないと採算が取れないため、人を集めるために長時間待機、、。\n\nやっとお客さんが三人集まり、ダランザドガドまで500kmのドライブ。英語は通じず、電波もないので持参した日本語モンゴル語辞典で会話する。窓からは壮大な景色。草原、家畜の群れ、日の入り。圧倒される。約8時間揺られ、23時ごろ到着。バックパッカーハウスだったっぽいが、閑散期なのか自分1人だけだった。ラッキー。",
      photoUrls: [`${IMG}/day2-1.jpg`, `${IMG}/day2-2.jpg`, `${IMG}/day2-3.jpg`]
    },
    {
      date: "4/2",
      summary: "バヤンザグ・砂丘・渓谷を巡る",
      text: "宿の方とWhatsappでやりとりし、事前に1DAYツアーを手配してもらっていた。おじさん1人と僕。舗装されていない道路を突き進み、最初に辿り着いたのはヨリーンアム渓谷。滝が凍っており見応えがある。\n\n次は砂丘。本当は有名なホンゴル砂丘に行きたかったのだが、遠かったので断念。風が強かった。小規模でありながらゴビ砂漠を味わえた。\n\nお次はバヤンザグ。オレンジ色の崖。絶景すぎた。日の入りだとより美しいらしい。こちらも人が誰もいなかった。\n\n夜ダランザドガドに戻り。現金支払い50万トゥグルグ（2.5万円くらい）。実際ゴビ砂漠周辺（南モンゴル）あたりのツアーは1人15万円くらいするものもあるので、かなりお得だった。",
      photoUrls: [`${IMG}/day3-1.jpg`, `${IMG}/day3-2.jpg`, `${IMG}/day3-3.jpg`]
    },
    {
      date: "4/3",
      summary: "ウランバートルへ戻る",
      text: "行きと同じ人に送ってもらう。往復1000km以上あるのに往復6000円ほどだった。安すぎる。ウランバートル到着後、羊肉は避けてバーガーキングに行ってしまった。その後タクシーで市内に戻りホテルにチェックイン。韓国人のオーナーだった。",
      photoUrls: [`${IMG}/day4-1.jpg`, `${IMG}/day4-2.jpg`, `${IMG}/day4-3.jpg`]
    },
    {
      date: "4/4",
      summary: "テレルジ国立公園・ゲル泊",
      text: "Get your Guideで5000円でテレルジ国立公園の有名観光地、市内の観光地を巡ってくれるツアーがあり直前予約。到着後は自由行動という形で、思いのまま見て回ることができた。\n\nその後はついに遊牧民ゲルホームステイ。ガイドの方がホテル前まで迎えに来てくれ、140km/hで1時間半。一家とご挨拶。夜ご飯を作ってくれ、夜は満天の星空。外は-10℃にまで冷え込んだが、ゲルの中は意外と暖かい。",
      photoUrls: [`${IMG}/day5-1.jpg`, `${IMG}/day5-2.jpg`, `${IMG}/day5-3.jpg`]
    },
    {
      date: "4/5-6",
      summary: "ソウル経由で帰国",
      text: "早朝に起き、日の出を見る。朝ごはんをいただき、家畜の世話をお手伝い。10時ごろには残念ながらお別れ。現地支払いで34000円。1人だったので高かったが、モンゴルでしかできない経験ができた。\n\n空港まで送迎してもらう。昼過ぎにウランバートルを出発し、夕方ソウル着。12時間ほどのトランジットをパラダイスシティで過ごす。翌日大阪着。",
      photoUrls: [`${IMG}/day6-1.jpg`, `${IMG}/day6-2.jpg`, `${IMG}/day6-3.jpg`]
    }
  ]
};

// 作成
$("createBtn").addEventListener("click", async () => {
  const m = $("createMsg");
  $("createBtn").disabled = true;
  show(m, "重複チェック中…", "ok");
  try{
    // 同じ著者・同じタイトルの記事が既にあれば中止
    const dup = await getDocs(query(
      collection(db, "articles"),
      where("authorId", "==", AUTHOR_ID),
      where("title", "==", TITLE)
    ));
    if(!dup.empty){
      show(m, "既に同じ記事が存在します（ID: " + dup.docs[0].id + "）。重複作成を中止しました。", "err");
      return;
    }
    const ref = doc(collection(db, "articles"));
    show(m, "作成中…", "ok");
    await setDoc(ref, Object.assign({}, articleData, {
      status: "pending",
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    }));
    show(m, "公開処理中…", "ok");
    await updateDoc(ref, { status: "published", updatedAt: serverTimestamp() });
    show(m, "✅ 作成・公開しました！ ID: " + ref.id + "　→ 確認: articles/view.html?id=" + ref.id, "ok");
  }catch(err){
    console.error(err);
    show(m, "エラー：" + (err.message || err), "err");
    $("createBtn").disabled = false;
  }
});

// 中国削除
$("delBtn").addEventListener("click", async () => {
  const m = $("delMsg");
  if(!confirm("中国記事（ZMyfpTdnoRVsKMzfaP9c）を完全に削除します。よろしいですか？")) return;
  $("delBtn").disabled = true;
  show(m, "削除中…", "ok");
  try{
    await deleteDoc(doc(db, "articles", "ZMyfpTdnoRVsKMzfaP9c"));
    show(m, "✅ 中国記事を削除しました。", "ok");
  }catch(err){
    console.error(err);
    show(m, "エラー：" + (err.message || err), "err");
    $("delBtn").disabled = false;
  }
});

// 管理者ゲート
onAuthStateChanged(auth, async (user) => {
  const gate = $("gate");
  if(!user){
    gate.className = "note err show";
    gate.innerHTML = 'ログインが必要です。<a href="./account.html">ログインページへ</a>';
    return;
  }
  let isAdmin = false;
  try{ isAdmin = (await getDoc(doc(db, "admins", user.uid))).exists(); }catch(e){}
  if(!isAdmin){
    gate.className = "note err show";
    gate.textContent = "このアカウントには管理者権限がありません。";
    return;
  }
  gate.className = "note";
  $("panel").style.display = "block";
});
</script>
</body>
</html>
