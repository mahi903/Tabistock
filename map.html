<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地図で旅を探す｜Tabistock</title>
  <meta name="description" content="世界地図から、行きたい国の旅程を探せます。ピンをタップすると、その国に投稿された旅のしおりが一覧で見られます。">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#1f6f5b">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Tabistock">
  <meta property="og:locale" content="ja_JP">
  <meta property="og:title" content="地図で旅を探す｜Tabistock">
  <meta property="og:description" content="世界地図から、行きたい国の旅程を探せます。">
  <meta property="og:url" content="https://tabistock.vercel.app/map.html">
  <link rel="stylesheet" href="style.css">
  <!-- Leaflet（無料・OpenStreetMap） -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    html,body{height:100%}
    body{margin:0;display:flex;flex-direction:column;overflow:hidden}
    .hd{position:static;background:rgba(246,239,228,.92);backdrop-filter:blur(12px);box-shadow:0 2px 14px rgba(0,0,0,.06);flex:0 0 auto}
    .hd .logo{color:#1f6f5b}
    .burger span{background:#1b2330}
    .mapwrap{flex:1 1 auto;position:relative;min-height:0}
    #map{position:absolute;inset:0;background:#aad3df;z-index:0}
    /* マップ上のヒント */
    .map-hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:5;background:#fff;border:1px solid #e7ddcb;border-radius:999px;padding:8px 16px;font-size:12.5px;font-weight:700;color:#1f6f5b;box-shadow:0 4px 14px rgba(0,0,0,.1);white-space:nowrap}
    .map-loading{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(247,241,232,.7);font-size:14px;color:#6c7787;font-weight:700}
    /* 国ピン（数字つき） */
    .ctpin{background:#1f6f5b;color:#fff;border:2.5px solid #fff;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;box-shadow:0 3px 10px rgba(0,0,0,.3);font-family:"Noto Sans JP",sans-serif}
    .ctpin:hover{background:#185645}
    /* 下からのパネル */
    .panel{position:absolute;left:0;right:0;bottom:0;z-index:40;background:#fff;border-radius:18px 18px 0 0;box-shadow:0 -6px 28px rgba(0,0,0,.18);transform:translateY(110%);transition:transform .26s ease;max-height:62%;display:flex;flex-direction:column}
    .panel.open{transform:none}
    @media(min-width:640px){.panel{left:auto;right:18px;bottom:18px;width:380px;border-radius:18px;max-height:calc(100% - 36px)}}
    .panel .phead{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid #eee3d2}
    .panel .phead h3{margin:0;font-size:16px;font-weight:800;color:#182033}
    .panel .phead .psub{font-size:11.5px;color:#6c7787;font-weight:600;margin-top:2px}
    .panel .pclose{background:none;border:none;font-size:23px;line-height:1;color:#6c7787;cursor:pointer;padding:0 4px}
    .panel .plist{overflow:auto;padding:8px 0}
    .prow{display:flex;gap:12px;padding:10px 18px;text-decoration:none;color:inherit;align-items:center}
    .prow:hover{background:#faf6ee}
    .prow .pth{width:74px;height:54px;border-radius:10px;background-size:cover;background-position:center;background-color:#e7ddcb;flex-shrink:0}
    .prow .pt{font-size:13.5px;font-weight:700;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .prow .pm{font-size:11px;color:#6c7787;margin-top:3px}
    .pempty{color:#6c7787;font-size:13px;text-align:center;padding:30px 16px}
    /* ドロワー内ナビ */
    .drawer{overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
    .drawer .dnav{display:flex;flex-direction:column;margin-bottom:16px}
    .drawer .dnav a{padding:15px 4px;font-size:16px;font-weight:700;color:#182033;text-decoration:none;border-bottom:1px solid #e7ddcb}
    .drawer .dnav a.cur{color:#1f6f5b}
  </style>
</head>
<body>
  <header class="hd" id="hd">
    <a class="logo" href="index.html">Tabistock</a>
    <div class="hd-r">
      <form class="hd-search" action="search.html" method="get"><input name="q" placeholder="旅先・キーワードで検索"><button type="submit">⌕</button></form>
      <button class="burger" id="burger" aria-label="メニューを開く"><span></span><span></span><span></span></button>
    </div>
  </header>
  <div class="ovl" id="ovl"></div>
  <nav class="drawer" id="drawer">
    <button class="dclose" id="dclose" aria-label="閉じる">×</button>
    <p class="dtitle">メニュー</p>
    <div class="dnav">
      <a href="index.html">トップ</a>
      <a href="search.html">条件で旅を検索</a>
      <a href="map.html" class="cur">地図で旅を探す</a>
    </div>
    <div id="authStatus" class="auth-status"></div>
  </nav>

  <div class="mapwrap">
    <div id="map"></div>
    <div class="map-hint">ピンをタップでその国の旅程一覧</div>
    <div class="map-loading" id="mapLoading">地図を読み込み中…</div>

    <!-- 国別の旅程パネル -->
    <div class="panel" id="panel">
      <div class="phead">
        <div>
          <h3 id="panelTitle">—</h3>
          <div class="psub" id="panelSub"></div>
        </div>
        <button class="pclose" id="panelClose" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="plist" id="panelList"></div>
    </div>
  </div>

  <!-- ドロワー開閉 -->
  <script>
  (function(){
    var burger=document.getElementById('burger'),nav=document.getElementById('drawer'),ovl=document.getElementById('ovl'),dc=document.getElementById('dclose');
    if(burger&&nav&&ovl){
      var t=function(o){burger.classList.toggle('open',o);nav.classList.toggle('open',o);ovl.classList.toggle('open',o);};
      burger.addEventListener('click',function(){t(!nav.classList.contains('open'))});
      ovl.addEventListener('click',function(){t(false)});
      if(dc)dc.addEventListener('click',function(){t(false)});
      nav.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){t(false)})});
    }
  })();
  </script>

  <!-- Leaflet 本体 -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- 地図ロジック -->
  <script type="module">
    import { db } from "./firebase-config.js";
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { COUNTRY_LL, cinfo, REGION_JP, BUDGETS, DAYS_OPT, esc } from "./tabistock-render.js";

    if(typeof L === 'undefined'){
      document.getElementById('mapLoading').textContent = '地図ライブラリ(Leaflet)を読み込めませんでした。通信環境をご確認ください。';
      throw new Error('Leaflet not loaded');
    }

    const map = L.map('map', { worldCopyJump:true, minZoom:2 }).setView([28, 30], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution:'&copy; OpenStreetMap',
      maxZoom:18
    }).addTo(map);
    // flexレイアウト内でのサイズ確定ずれ対策
    setTimeout(()=>map.invalidateSize(), 200);
    window.addEventListener('resize', ()=>map.invalidateSize());

    const panel = document.getElementById('panel');
    const panelTitle = document.getElementById('panelTitle');
    const panelSub = document.getElementById('panelSub');
    const panelList = document.getElementById('panelList');
    document.getElementById('panelClose').addEventListener('click', ()=> panel.classList.remove('open'));

    const budgetL = v => (BUDGETS.find(b=>b.v===v)||{}).l || '';
    const daysL   = v => (DAYS_OPT.find(d=>d.v===v)||{}).l || '';

    function renderRow(d){
      const thumb = d.thumbUrl || (d.heroUrls && d.heroUrls[0]) || "";
      const cs = (d.countries||[]).map(c=>(cinfo(c)||{}).jp).filter(Boolean).join('・');
      const meta = [cs, budgetL(d.budget), daysL(d.days_v)].filter(Boolean).join(' · ');
      return `<a class="prow" href="./articles/view.html?id=${esc(d.id)}">
        <div class="pth" style="background-image:url('${esc(thumb)}')"></div>
        <div><div class="pt">${esc(d.title||'(無題)')}</div><div class="pm">${esc(meta)}</div></div>
      </a>`;
    }

    function openCountry(countryV, articles){
      const info = cinfo(countryV) || {jp:countryV, r:''};
      panelTitle.textContent = info.jp;
      panelSub.textContent = (REGION_JP[info.r]||'') + `　${articles.length}件の旅程`;
      panelList.innerHTML = articles.length
        ? articles.map(renderRow).join('')
        : `<p class="pempty">この国の旅程はまだありません。</p>`;
      panel.classList.add('open');
    }

    (async () => {
      const loading = document.getElementById('mapLoading');
      try{
        const snap = await getDocs(query(collection(db,"articles"), where("status","==","published")));
        const docs = [];
        snap.forEach(s => docs.push({ id:s.id, ...s.data() }));
        docs.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

        // 国ごとに記事をまとめる（1記事が複数国に属する場合は各国に出す）
        const byCountry = {};
        docs.forEach(d => (d.countries||[]).forEach(c => {
          (byCountry[c] = byCountry[c] || []).push(d);
        }));

        let placed = 0;
        Object.keys(byCountry).forEach(c => {
          const ll = COUNTRY_LL[c];
          if(!ll) return; // 座標未登録の国はスキップ
          const arr = byCountry[c];
          const icon = L.divIcon({
            className:'', html:`<div class="ctpin">${arr.length}</div>`,
            iconSize:[38,38], iconAnchor:[19,19]
          });
          L.marker(ll, { icon }).addTo(map).on('click', ()=> openCountry(c, arr));
          placed++;
        });

        loading.remove();
        if(!placed){
          const hint = document.querySelector('.map-hint');
          if(hint) hint.textContent = 'まだ地図に表示できる旅程がありません';
        }
      }catch(err){
        console.error(err);
        loading.textContent = '読み込みに失敗しました';
      }
    })();
  </script>
  <script type="module" src="./auth-status.js"></script>
  <!-- Vercel Web Analytics -->
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
