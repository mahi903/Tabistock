<script>
function runSearchFilter(){
    const params = new URLSearchParams(window.location.search);
  const tripCards = document.querySelectorAll(".trip-card");
  const noResults = document.querySelector(".no-results");

  const filters = {};

  for (const [filter, value] of params.entries()) {
    if (filter === "q") continue;
    if (!filters[filter]) filters[filter] = [];
    filters[filter].push(value);
  }

  const keyword = params.get("q");
  let visibleCount = 0;

  tripCards.forEach(card => {
    let isMatch = true;

    for (const filter in filters) {
      const cardValue = card.dataset[filter] || "";
      const selectedValues = filters[filter];

     let matchesThisFilter;

if (filter === "budget") {
  matchesThisFilter = selectedValues.some(value =>
    // 「50万円以上」(50plus) は Number() が NaN になり全件0件になるので特別扱い。
    // 50plus の旅程は data-budget="50" として保存されるため、50以上を対象にする。
    value === "50plus" ? Number(cardValue) >= 50 : Number(cardValue) <= Number(value)
  );
} else {
  matchesThisFilter = selectedValues.some(value =>
    cardValue.includes(value)
  );
}

      if (!matchesThisFilter) isMatch = false;
    }

    const cardText = (card.textContent + " " + (card.dataset.search || "")).toLowerCase();
    const keywordMatch = !keyword || cardText.includes(keyword.toLowerCase());

    if (!keywordMatch) isMatch = false;

    card.style.display = isMatch ? "block" : "none";
    if (isMatch) visibleCount++;
  });

  if (noResults) {
  // DB記事の読み込みが終わるまでは「該当なし」を出さない（初回同期実行で一瞬出るのを防ぐ）。
  noResults.style.display = (window.__articlesLoaded && visibleCount === 0) ? "block" : "none";
}

  // ===== PC sidebar filter + active conditions =====
  (function(){
    const sideIds = { country:"fs-country", budget:"fs-budget", days:"fs-days", style:"fs-style" };
    const known = ["country","region","budget","days","style","q"];

    // reflect current params into sidebar selects
    Object.keys(sideIds).forEach(key => {
      const el = document.getElementById(sideIds[key]);
      const val = params.get(key);
      if (el && val) el.value = val;
    });

    // value -> label dictionary built from sidebar option texts
    const labelOf = {};
    Object.values(sideIds).forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.querySelectorAll("option").forEach(o => { if (o.value) labelOf[o.value] = o.textContent.trim(); });
    });
    const regionLabel = {"east-asia":"東アジア","southeast-asia":"東南アジア","south-asia":"南アジア","central-asia":"中央アジア","west-asia":"西アジア","europe":"ヨーロッパ","north-america":"北アメリカ","south-america":"南アメリカ","africa":"アフリカ","oceania":"オセアニア"};
    const labelFor = (key, value) => {
      if (key === "q") return `「${value}」`;
      if (key === "region") return regionLabel[value] || value;
      if (key === "budget") return labelOf[value] || `〜${value}万円`;
      return labelOf[value] || value;
    };

    // results count
    const countEl = document.getElementById("resultsCount");
    const hasAny = [...params.keys()].some(k => known.includes(k));
    if (countEl) countEl.textContent = hasAny
      ? `条件に合う旅程：${visibleCount}件`
      : `すべての旅程：${visibleCount}件`;

    // active-filter chips (each links to a state with that one condition removed)
    const wrap = document.getElementById("activeFilters");
    if (wrap) {
      const chips = [];
      for (const [key, value] of params.entries()) {
        if (!known.includes(key)) continue;
        const p = new URLSearchParams();
        for (const [k, v] of params.entries()) {
          if (k === key && v === value) continue; // drop only this pair
          p.append(k, v);
        }
        chips.push(`<a class="chip" href="search.html?${p.toString()}">${labelFor(key, value)}<span class="chip-x">×</span></a>`);
      }
      wrap.innerHTML = chips.length
        ? chips.join("") + `<a class="chip chip-clear" href="search.html">すべて解除</a>`
        : "";
    }

    // apply / clear
    const apply = document.getElementById("fsApply");
    if (apply) apply.addEventListener("click", () => {
      const p = new URLSearchParams();
      const q = params.get("q"); if (q) p.append("q", q);
      Object.keys(sideIds).forEach(key => {
        const el = document.getElementById(sideIds[key]);
        if (el && el.value) p.append(key, el.value);
      });
      window.location.href = `search.html?${p.toString()}`;
    });
    const clear = document.getElementById("fsClear");
    if (clear) clear.addEventListener("click", () => { window.location.href = "search.html"; });
  })();
}
window.runSearchFilter = runSearchFilter;

// ===== 並び替え（DBカードのみ。手書きの旧カードは末尾固定） =====
function sortResultCards(){
  const grid = document.querySelector(".trip-grid");
  if(!grid) return;
  const mode = (document.getElementById("sortBy") || {}).value || "new";
  const cards = [...grid.querySelectorAll(".trip-card")];
  const db = cards.filter(c => c.dataset.id);
  const legacy = cards.filter(c => !c.dataset.id);
  const num = (c, k) => Number(c.dataset[k] || 0);
  db.sort((a, b) => {
    if(mode === "likes") return num(b,"likes") - num(a,"likes") || num(b,"created") - num(a,"created");
    if(mode === "old")   return num(a,"created") - num(b,"created");
    return num(b,"created") - num(a,"created"); // new（既定）
  });
  [...db, ...legacy].forEach(c => grid.appendChild(c));
}
window.sortResultCards = sortResultCards;
const sortSel = document.getElementById("sortBy");
if(sortSel) sortSel.addEventListener("change", sortResultCards);

runSearchFilter();

  <!-- DBの公開記事を自動表示（既存の手書きカードはそのまま下に残す＝段階移行） -->
  <script type="module">
    import { db } from "./firebase-config.js";
    import { collection, query, where, getDocs, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { renderCard } from "./tabistock-render.js";

    const grid = document.querySelector(".trip-grid");
    if (grid) {
      let docs = [];
      try {
        const qy = query(collection(db, "articles"), where("status", "==", "published"));
        const snap = await getDocs(qy);
        snap.forEach(s => docs.push({ id: s.id, ...s.data() }));
        docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        if (docs.length) {
          grid.insertAdjacentHTML("afterbegin", docs.map(renderCard).join("\n"));
        }
      } catch (err) {
        console.error("記事の読み込みに失敗:", err);
      }
      // カード追加後にフィルタ（件数・絞り込み・チップ）と並び替えを再実行
      window.__articlesLoaded = true; // ここで初めて「該当なし」表示を許可
      if (window.runSearchFilter) window.runSearchFilter();
      if (window.sortResultCards) window.sortResultCards();

      // いいね順のために各記事のいいね数を集計して data-likes に反映（記事が少ない今は都度集計）
      Promise.all(docs.map(async d => {
        try {
          const c = await getCountFromServer(collection(db, "articles", d.id, "likes"));
          const el = grid.querySelector(`.trip-card[data-id="${d.id}"]`);
          if (el) el.dataset.likes = c.data().count;
        } catch (e) { /* 集計失敗時は0のまま */ }
      })).then(() => {
        const sel = document.getElementById("sortBy");
        if (sel && sel.value === "likes" && window.sortResultCards) window.sortResultCards();
      });
    }
  </script>
