const drawerFilterBtns = document.querySelectorAll("#drawer-filter-btn");
drawerFilterBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    const drawer = btn.closest(".filter-drawer");
    const params = new URLSearchParams();

    const keywordInput = drawer.querySelector('input[name="q"]');
    if (keywordInput && keywordInput.value.trim()) {
      params.append("q", keywordInput.value.trim());
    }

    drawer.querySelectorAll("select").forEach(select => {
      if (select.value) {
        params.append(select.name, select.value);
      }
    });

    window.location.href = `../search.html?${params.toString()}`;
  });
});

<script type="module">
import { db, auth } from "../firebase-config.js";

function initInteractions(){
  // ヒーローカルーセルのドット
  const slider = root.querySelector(".hero-images");
  const dots = root.querySelectorAll(".hero-dots span");
  if(slider && dots.length){
    if(dots[0]) dots[0].classList.add("active");
    slider.addEventListener("scroll", () => {
      const index = Math.round(slider.scrollLeft / slider.clientWidth);
      dots.forEach((dot, i) => dot.classList.toggle("active", i === index));
    });
  }
  // 旅の概要：ボタン → 中央モーダルで該当カードを表示、×／背景／Escで閉じる
  const ovModal = root.querySelector("#ovModal");
  if(ovModal){
    const panels = ovModal.querySelectorAll(".ov-panel");
    const openOv = (k) => {
      panels.forEach(p => p.classList.toggle("is-active", p.dataset.ov === k));
      ovModal.hidden = false;
      document.body.classList.add("ov-lock");
    };
    const closeOv = () => {
      ovModal.hidden = true;
      document.body.classList.remove("ov-lock");
    };
    root.querySelectorAll(".ov-tab").forEach(tab => {
      tab.addEventListener("click", () => openOv(tab.dataset.ov));
    });
    ovModal.querySelectorAll("[data-ov-close]").forEach(el => el.addEventListener("click", closeOv));
    document.addEventListener("keydown", (e) => { if(e.key === "Escape" && !ovModal.hidden) closeOv(); });
  }
  // DAYカードの開閉（スマホ）
  root.querySelectorAll(".day-card").forEach(card => {
    const toggle = card.querySelector(".day-toggle");
    const icon = card.querySelector(".day-icon");
    if(!toggle || !icon) return;
    toggle.addEventListener("click", () => {
      if(window.innerWidth > 768) return;
      card.classList.toggle("is-open");
      icon.textContent = card.classList.contains("is-open") ? "-" : "+";
    });
  });
  // いいね・共有・フォロー
  const showToast = (m) => {
    const t = document.createElement("div");
    t.className = "tabi-toast"; t.textContent = m;
    document.body.appendChild(t);
    requestAnimationFrame(() => t.classList.add("show"));
    setTimeout(() => { t.classList.remove("show"); setTimeout(() => t.remove(), 300); }, 1800);
  };
  wireLike();
  wireSave();
  const shareBtn = root.querySelector("#shareBtn");
  if(shareBtn){
    shareBtn.addEventListener("click", () => openShareMenu(showToast));
  }
  wireFollow();
}

// 文字を最大幅で折り返す（日本語＝1文字ずつ計測、改行も尊重）
function wrapText(ctx, text, maxW){
  const lines = []; let line = "";
  for(const ch of (text || "")){
    if(ch === "\n"){ lines.push(line); line = ""; continue; }
    const test = line + ch;
    if(ctx.measureText(test).width > maxW && line){ lines.push(line); line = ch; }
    else line = test;
  }
  if(line) lines.push(line);
  return lines;
}

// インスタのストーリー用画像（1080×1920）を生成して File を返す。
// 白背景の中央に、写真＋ロゴ＋タイトル＋小見出しを載せた「縁アリカード」を配置。
async function makeStoryImage(){
  const W = 1080, H = 1920;
  const cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");
  const FT = '"Noto Sans JP", system-ui, sans-serif';
  const LOGO_FT = '-apple-system, BlinkMacSystemFont, "Helvetica Neue", "Yu Gothic", sans-serif';

  // 背景（白）
  ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, W, H);

  // 写真の取得（Firebase Storage はCORS非対応のため同一オリジンのプロキシ経由）
  let photo = null;
  try{
    const heroImg = root.querySelector(".hero-images img");
    const imgUrl = heroImg && heroImg.getAttribute("src");
    if(imgUrl){
      const fetchUrl = /^https:\/\/firebasestorage\.googleapis\.com\//.test(imgUrl)
        ? "/api/img?u=" + encodeURIComponent(imgUrl)
        : imgUrl;
      const res = await fetch(fetchUrl);
      const objUrl = URL.createObjectURL(await res.blob());
      try{
        photo = await new Promise((resolve, reject) => {
          const im = new Image();
          const to = setTimeout(() => reject(new Error("img load timeout")), 8000);
          im.onload = () => { clearTimeout(to); resolve(im); };
          im.onerror = () => { clearTimeout(to); reject(new Error("img load failed")); };
          im.decoding = "async";
          im.src = objUrl;
        });
      }finally{ URL.revokeObjectURL(objUrl); }
    }
  }catch(e){ photo = null; }

  try{
    if(document.fonts && document.fonts.ready){
      await Promise.race([document.fonts.ready, new Promise(r => setTimeout(r, 1500))]);
    }
  }catch(e){}

  ctx.textBaseline = "alphabetic";

  // カード寸法（白背景の中央に配置）
  const margin = 70, cardX = margin, cardW = W - margin * 2, cardR = 48;
  const cardH = 1540, cardY = Math.round((H - cardH) / 2);

  // 角丸長方形パス
  const rr = (x, y, w, h, r) => {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  };

  // カードの影
  ctx.save();
  ctx.shadowColor = "rgba(20,30,25,0.22)"; ctx.shadowBlur = 56; ctx.shadowOffsetY = 18;
  ctx.fillStyle = "#10241d"; rr(cardX, cardY, cardW, cardH, cardR); ctx.fill();
  ctx.restore();

  // 以降はカード内部だけに描画（角丸クリップ）
  ctx.save();
  rr(cardX, cardY, cardW, cardH, cardR); ctx.clip();

  // 写真をカード全面に cover（失敗時は緑下地）
  if(photo){
    const iw = photo.naturalWidth || photo.width, ih = photo.naturalHeight || photo.height;
    const scale = Math.max(cardW / iw, cardH / ih);
    const dw = iw * scale, dh = ih * scale;
    ctx.drawImage(photo, cardX + (cardW - dw) / 2, cardY + (cardH - dh) / 2, dw, dh);
  }else{
    const base = ctx.createLinearGradient(0, cardY, 0, cardY + cardH);
    base.addColorStop(0, "#1f6f5b"); base.addColorStop(1, "#10241d");
    ctx.fillStyle = base; ctx.fillRect(cardX, cardY, cardW, cardH);
  }

  // 上下グラデーション（ロゴ・文字の可読性確保）
  const gTop = ctx.createLinearGradient(0, cardY, 0, cardY + cardH * 0.26);
  gTop.addColorStop(0, "rgba(8,18,14,0.55)"); gTop.addColorStop(1, "rgba(8,18,14,0)");
  ctx.fillStyle = gTop; ctx.fillRect(cardX, cardY, cardW, cardH * 0.26);
  const gBot = ctx.createLinearGradient(0, cardY + cardH * 0.38, 0, cardY + cardH);
  gBot.addColorStop(0, "rgba(8,18,14,0)");
  gBot.addColorStop(0.55, "rgba(8,18,14,0.62)");
  gBot.addColorStop(1, "rgba(8,18,14,0.97)");
  ctx.fillStyle = gBot; ctx.fillRect(cardX, cardY, cardW, cardH);

  const pad = 56, innerX = cardX + pad, maxW = cardW - pad * 2;

  // ロゴ（カード左上・白）
  ctx.fillStyle = "#ffffff";
  ctx.font = `900 60px ${LOGO_FT}`;
  try{ ctx.letterSpacing = "-0.04em"; }catch(e){}
  ctx.fillText("Tabistock", innerX, cardY + 96);
  try{ ctx.letterSpacing = "normal"; }catch(e){}
  ctx.fillStyle = "#7fd9bf";
  ctx.fillRect(innerX, cardY + 116, 132, 6);

  // 下から積み上げ：URL → 小見出し → タイトル → 国・地域
  let y = cardY + cardH - 76;
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.font = `700 34px ${FT}`;
  ctx.fillText("tabistock.jp", innerX, y);
  y -= 74;

  const leadEl = root.querySelector(".hero-lead");
  const lead = (leadEl ? leadEl.textContent : "").trim().replace(/\s+/g, " ");
  if(lead){
    ctx.fillStyle = "rgba(255,255,255,0.92)";
    ctx.font = `500 38px ${FT}`;
    const leadLines = wrapText(ctx, lead, maxW).slice(0, 2);
    for(let i = leadLines.length - 1; i >= 0; i--){ ctx.fillText(leadLines[i], innerX, y); y -= 54; }
    y -= 14;
  }

  const titleEl = root.querySelector(".hero-text h1");
  const title = (titleEl ? titleEl.textContent : document.title).trim();
  ctx.fillStyle = "#ffffff";
  ctx.font = `800 70px ${FT}`;
  const tLines = wrapText(ctx, title, maxW).slice(0, 3);
  for(let i = tLines.length - 1; i >= 0; i--){ ctx.fillText(tLines[i], innerX, y); y -= 86; }
  y -= 4;

  const eyeEl = root.querySelector(".hero-eyebrow");
  const eye = (eyeEl ? eyeEl.textContent : "").trim();
  if(eye){
    ctx.fillStyle = "#7fd9bf";
    ctx.font = `800 36px ${FT}`;
    ctx.fillText(eye, innerX, y);
  }

  ctx.restore(); // クリップ解除

  // カードの枠線（最後に上から）
  ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 3;
  rr(cardX, cardY, cardW, cardH, cardR); ctx.stroke();

  const blob = await new Promise(r => cv.toBlob(r, "image/jpeg", 0.92));
  return new File([blob], "tabistock-story.jpg", { type: "image/jpeg" });
}

// 共有メニュー（ボトムシート）。ストーリー画像 / リンクコピー / 他アプリ共有 を選べる。
function openShareMenu(showToast){
  const url = location.href, title = document.title;
  const old = document.querySelector(".share-sheet-ovl"); if(old) old.remove();

  const ovl = document.createElement("div");
  ovl.className = "share-sheet-ovl";
  ovl.style.cssText = "position:fixed;inset:0;z-index:9999;background:rgba(15,20,18,.45);display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .2s";
  const sheet = document.createElement("div");
  sheet.style.cssText = "background:#fff;width:100%;max-width:480px;border-radius:18px 18px 0 0;padding:8px 14px calc(16px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.2);transform:translateY(14px);transition:transform .2s";
  const row = "display:flex;align-items:center;gap:13px;width:100%;background:none;border:none;border-radius:12px;padding:16px 12px;font-size:16px;font-weight:700;color:#182033;font-family:inherit;cursor:pointer;text-align:left";
  const ic = "color:#1f6f5b;width:24px;text-align:center;flex:0 0 24px";
  sheet.innerHTML =
    '<div style="width:40px;height:4px;background:#e0d8c7;border-radius:999px;margin:8px auto 10px"></div>'
    + '<button data-act="story" style="'+row+'"><i class="fa-solid fa-image" style="'+ic+'"></i><span>ストーリー画像を作成（インスタ向け）</span></button>'
    + '<button data-act="copy" style="'+row+'"><i class="fa-solid fa-link" style="'+ic+'"></i><span>リンクをコピー</span></button>'
    + (navigator.share ? '<button data-act="native" style="'+row+'"><i class="fa-solid fa-arrow-up-from-bracket" style="'+ic+'"></i><span>他のアプリで共有</span></button>' : '')
    + '<button data-act="cancel" style="'+row+'justify-content:center;color:#6c7787;margin-top:2px">キャンセル</button>';
  ovl.appendChild(sheet);
  document.body.appendChild(ovl);
  requestAnimationFrame(() => { ovl.style.opacity = "1"; sheet.style.transform = "none"; });

  const close = () => { ovl.style.opacity = "0"; setTimeout(() => ovl.remove(), 200); };
  ovl.addEventListener("click", (e) => { if(e.target === ovl) close(); });
  sheet.querySelector('[data-act="cancel"]').addEventListener("click", close);

  sheet.querySelector('[data-act="copy"]').addEventListener("click", async () => {
    close();
    try{ await navigator.clipboard.writeText(url); showToast("リンクをコピーしました"); }
    catch(e){ showToast("コピーできませんでした"); }
  });

  const nativeBtn = sheet.querySelector('[data-act="native"]');
  if(nativeBtn) nativeBtn.addEventListener("click", async () => {
    close();
    try{ await navigator.share({ title, url }); }catch(e){}
  });

  sheet.querySelector('[data-act="story"]').addEventListener("click", async (e) => {
    const btn = e.currentTarget, span = btn.querySelector("span");
    btn.disabled = true; sheet.style.pointerEvents = "none"; if(span) span.textContent = "作成中…";
    let file = null;
    try{ file = await makeStoryImage(); }catch(err){ file = null; }
    close();
    if(!file){ showToast("画像を作成できませんでした"); return; }
    try{
      if(navigator.canShare && navigator.canShare({ files: [file] })){
        await navigator.share({ files: [file] });
      }else{
        const a = document.createElement("a");
        a.href = URL.createObjectURL(file); a.download = file.name; a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 4000);
        showToast("ストーリー画像を保存しました");
      }
    }catch(err){ /* キャンセルは無視 */ }
  });
}

// フォロー（Firestore: users/{me}/following/{target} ＋ users/{target}/followers/{me}・要ログイン）
function wireFollow(){
  const btn = root.querySelector("#followBtn");
  if(!btn) return;
  const target = btn.getAttribute("data-uid");
  if(!target){ btn.style.display = "none"; return; }
  let me = null, following = false, busy = false;
  const paint = () => {
    btn.classList.toggle("following", following);
    btn.setAttribute("aria-pressed", following);
    btn.querySelector("span").textContent = following ? "フォロー中" : "フォロー";
    btn.querySelector("i").className = following ? "fa-solid fa-check" : "fa-solid fa-plus";
  };
  onAuthStateChanged(auth, async (user) => {
    me = user ? user.uid : null;
    if(me && me === target){ btn.style.display = "none"; return; } // 自分の記事ではフォロー不要
    btn.style.display = "";
    if(me){ try{ following = (await getDoc(doc(db,"users",me,"following",target))).exists(); }catch(e){ following = false; } }
    else following = false;
    paint();
  });
  btn.addEventListener("click", async () => {
    if(busy) return;
    if(!me){ alert("フォローするにはログインが必要です。"); location.href = "../account.html"; return; }
    busy = true;
    try{
      if(following){
        await deleteDoc(doc(db,"users",me,"following",target));
        await deleteDoc(doc(db,"users",target,"followers",me));
        following = false;
      }else{
        await setDoc(doc(db,"users",me,"following",target), { createdAt: serverTimestamp() });
        await setDoc(doc(db,"users",target,"followers",me), { createdAt: serverTimestamp() });
        following = true;
        sendNotification({ toUid: target, type: "follow" });
      }
      paint();
    }catch(e){ console.error(e); }
    finally{ busy = false; }
  });
}

// いいね（Firestore: articles/{id}/likes/{uid}・要ログイン）
function wireLike(){
  const likeBtn = root.querySelector("#likeBtn"), likeCount = root.querySelector("#likeCount");
  if(!likeBtn || !likeCount) return;
  const likesCol = collection(db, "articles", id, "likes");
  let liked = false, uid = null, busy = false;
  const paint = () => {
    likeBtn.classList.toggle("liked", liked);
    likeBtn.setAttribute("aria-pressed", liked);
    likeBtn.querySelector("i").className = liked ? "fa-solid fa-heart" : "fa-regular fa-heart";
  };
  const refreshCount = async () => {
    try{ const c = await getCountFromServer(likesCol); likeCount.textContent = c.data().count; }
    catch(e){ console.warn("いいね数の取得に失敗:", e); }
  };
  refreshCount();
  onAuthStateChanged(auth, async (user) => {
    uid = user ? user.uid : null;
    if(uid){ try{ liked = (await getDoc(doc(db,"articles",id,"likes",uid))).exists(); }catch(e){ liked=false; } }
    else liked = false;
    paint();
  });
  likeBtn.addEventListener("click", async () => {
    if(busy) return;
    if(!uid){ alert("いいねするにはログインが必要です。"); location.href = "../account.html"; return; }
    busy = true;
    try{
      const ref = doc(db,"articles",id,"likes",uid);
      if(liked){ await deleteDoc(ref); liked = false; }
      else {
        await setDoc(ref, { createdAt: serverTimestamp() }); liked = true;
        sendNotification({ toUid: articleAuthorId, type: "like", articleId: id, articleTitle });
      }
      paint();
      await refreshCount();
    }catch(e){ console.error(e); }
    finally{ busy = false; }
  });
}

// 保存（Firestore: users/{uid}/saves/{articleId}・要ログイン）
function wireSave(){
  const saveBtn = root.querySelector("#saveBtn");
  if(!saveBtn) return;
  let saved = false, uid = null, busy = false;
  const paint = () => {
    saveBtn.classList.toggle("saved", saved);
    saveBtn.setAttribute("aria-pressed", saved);
    saveBtn.querySelector("i").className = saved ? "fa-solid fa-bookmark" : "fa-regular fa-bookmark";
    const sp = saveBtn.querySelector("span"); if(sp) sp.textContent = saved ? "保存済み" : "保存";
  };
  onAuthStateChanged(auth, async (user) => {
    uid = user ? user.uid : null;
    if(uid){ try{ saved = (await getDoc(doc(db,"users",uid,"saves",id))).exists(); }catch(e){ saved=false; } }
    else saved = false;
    paint();
  });
  saveBtn.addEventListener("click", async () => {
    if(busy) return;
    if(!uid){ alert("保存するにはログインが必要です。"); location.href = "../account.html"; return; }

    try{
      const ref = doc(db,"users",uid,"saves",id);

// コメント（Firestore: articles/{id}/comments・閲覧は誰でも／投稿は要ログイン）
function initComments(){
  const section = document.getElementById("comments");
  const cForm = document.getElementById("cForm");
  const cList = document.getElementById("cList");
  const cCount = document.getElementById("cCount");
  if(!section || !cForm || !cList) return;
  section.hidden = false;

  const col = collection(db, "articles", id, "comments");
  const defAvatar = "data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20fill%3D%22%23e7ddcb%22%2F%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2240%22%20r%3D%2218%22%20fill%3D%22%23b9ad95%22%2F%3E%3Cpath%20d%3D%22M20%2086c0-17%2013-28%2030-28s30%2011%2030%2028z%22%20fill%3D%22%23b9ad95%22%2F%3E%3C%2Fsvg%3E";

  let me = null, myName = "", myPhoto = "", amAdmin = false;

  const fmt = (ts) => {
    try{
      const dt = ts && ts.toDate ? ts.toDate() : null;
      if(!dt) return "";
      return dt.getFullYear()+"/"+(dt.getMonth()+1)+"/"+dt.getDate();
    }catch(e){ return ""; }
  };

  const likesCache = {};   // cid -> { count, mine }
  const authorOf = {};     // cid -> authorId（返信通知用）

  const actionBar = (c, isReply) => {
    const st = likesCache[c.id] || { count:0, mine:false };
    let h = '<div class="comment-actions">';
    h += '<button class="comment-like'+(st.mine?' liked':'')+'" type="button" data-like="'+esc(c.id)+'" aria-label="いいね">'
       +   '<i class="'+(st.mine?'fa-solid':'fa-regular')+' fa-heart"></i>'
       +   '<span class="comment-like-count">'+(st.count||"")+'</span>'
       + '</button>';
    if(!isReply){
      h += '<button class="comment-reply-btn" type="button" data-reply="'+esc(c.id)+'">返信</button>';
    }
    h += '</div>';
    return h;
  };

  const commentHTML = (c, opts) => {
    opts = opts || {};
    const isReply = !!opts.isReply;
    const canDel = amAdmin || (me && c.authorId === me);
    const photo = c.authorPhotoURL ? esc(c.authorPhotoURL) : defAvatar;
    const badge = adminSet.has(c.authorId) ? ' <i class="fa-solid fa-circle-check admin-badge" title="管理者"></i>' : '';
    const nameTxt = esc(c.authorName || "ゲスト");
    const nameHTML = c.authorId
      ? '<a class="comment-name-link" href="../user.html?uid='+encodeURIComponent(c.authorId)+'">'+nameTxt+'</a>'
      : nameTxt;
    return '<div class="comment'+(isReply?' comment-reply':'')+'" data-cid="'+esc(c.id)+'">'
      + '<img class="comment-avatar" src="'+photo+'" alt="" onerror="this.src=\''+defAvatar+'\'">'
      + '<div class="comment-body">'
      +   '<div class="comment-head">'
      +     '<strong>'+nameHTML+badge+'</strong>'
      +     '<span class="comment-time">'+esc(fmt(c.createdAt))+'</span>'
      +     (canDel ? '<button class="comment-del" type="button" data-del="'+esc(c.id)+'">削除</button>' : '')
      +   '</div>'
      +   '<div class="comment-text">'+para(c.text || "")+'</div>'
      +   actionBar(c, isReply)
      + (isReply ? '' : '<div class="comment-replies" data-replies="'+esc(c.id)+'">'+(opts.repliesHTML||"")+'</div>')
      + '</div></div>';
  };

  const loadLikes = async (items) => {
    await Promise.all(items.map(async c => {
      try{
        const cnt = await getCountFromServer(collection(db,"articles",id,"comments",c.id,"likes"));
        let mine = false;
        if(me) mine = (await getDoc(doc(db,"articles",id,"comments",c.id,"likes",me))).exists();
        likesCache[c.id] = { count: cnt.data().count, mine };
      }catch(e){ likesCache[c.id] = likesCache[c.id] || { count:0, mine:false }; }
    }));
  };

  const toggleLike = async (cid, btn) => {
    if(!me){ alert("いいねするにはログインが必要です。"); location.href = "../account.html"; return; }
    const st = likesCache[cid] || { count:0, mine:false };
    const ref = doc(db,"articles",id,"comments",cid,"likes",me);
    btn.disabled = true;
    try{
      if(st.mine){ await deleteDoc(ref); st.mine = false; st.count = Math.max(0, st.count-1); }
      else { await setDoc(ref, { likedAt: serverTimestamp() }); st.mine = true; st.count++; }
      likesCache[cid] = st;
      btn.classList.toggle("liked", st.mine);
      const ic = btn.querySelector("i"); if(ic) ic.className = (st.mine?"fa-solid":"fa-regular")+" fa-heart";
      const cn = btn.querySelector(".comment-like-count"); if(cn) cn.textContent = st.count || "";
    }catch(e){ console.error(e); alert("いいねできませんでした。"); }
    finally{ btn.disabled = false; }
  };

  const openReplyForm = (parentId) => {
    if(!me){ alert("返信するにはログインが必要です。"); location.href = "../account.html"; return; }
    const box = cList.querySelector('[data-replies="'+parentId+'"]');
    if(!box) return;
    const existing = box.querySelector(".reply-form");
    if(existing){ existing.remove(); return; }   // トグル
    const form = document.createElement("div");
    form.className = "reply-form";
    form.innerHTML = '<textarea class="reply-input" maxlength="1000" rows="2" placeholder="返信を書く…"></textarea>'
      + '<div class="comment-form-foot">'
      +   '<button class="comment-submit reply-submit" type="button">返信する</button>'
      +   '<button class="reply-cancel" type="button">キャンセル</button>'
      + '</div>';
    box.insertBefore(form, box.firstChild);
    const inp = form.querySelector(".reply-input");
    const sub = form.querySelector(".reply-submit");
    const cancel = form.querySelector(".reply-cancel");
    inp.focus();
    cancel.addEventListener("click", () => form.remove());
    sub.addEventListener("click", async () => {
      const text = (inp.value || "").trim();
      if(!text){ inp.focus(); return; }
      sub.disabled = true;
      try{
        await addDoc(col, {
          authorId: me,
          authorName: myName || "ゲスト",
          authorPhotoURL: myPhoto || "",
          text,
          parentId,
          createdAt: serverTimestamp()
        });
        const parentAuthor = authorOf[parentId];
        if(parentAuthor && parentAuthor !== me){
          sendNotification({ toUid: parentAuthor, type: "comment", articleId: id, articleTitle });
        }
        await loadComments();
      }catch(e){ console.error(e); alert("返信できませんでした。"); }
      finally{ sub.disabled = false; }
    });
  };

  const wireEvents = () => {
    cList.querySelectorAll("[data-del]").forEach(btn => {
      btn.addEventListener("click", async () => {
        if(!confirm("このコメントを削除しますか？")) return;
        try{
          await deleteDoc(doc(db,"articles",id,"comments",btn.getAttribute("data-del")));
          await loadComments();
        }catch(e){ console.error(e); alert("削除できませんでした。"); }
      });
    });
    cList.querySelectorAll("[data-like]").forEach(btn => {
      btn.addEventListener("click", () => toggleLike(btn.getAttribute("data-like"), btn));
    });
    cList.querySelectorAll("[data-reply]").forEach(btn => {
      btn.addEventListener("click", () => openReplyForm(btn.getAttribute("data-reply")));
    });
  };

  const loadComments = async () => {
    try{
      const qs = await getDocs(query(col, orderBy("createdAt","desc")));
      const all = [];
      qs.forEach(s => all.push(Object.assign({ id: s.id }, s.data())));
      all.forEach(c => { authorOf[c.id] = c.authorId || null; });
      if(cCount) cCount.textContent = all.length ? "("+all.length+")" : "";

      const tops = all.filter(c => !c.parentId);
      const repliesBy = {};
      all.filter(c => c.parentId).forEach(c => { (repliesBy[c.parentId] = repliesBy[c.parentId] || []).push(c); });
      Object.values(repliesBy).forEach(arr => arr.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0)));

      await loadLikes(all);

      if(!tops.length){
        cList.innerHTML = '<p class="comments-empty">まだコメントはありません。最初のコメントを書いてみましょう。</p>';
        return;
      }
      cList.innerHTML = tops.map(c => {
        const repliesHTML = (repliesBy[c.id] || []).map(r => commentHTML(r, { isReply:true })).join("");
        return commentHTML(c, { repliesHTML });
      }).join("");
      wireEvents();
    }catch(e){ console.error(e); cList.innerHTML = '<p class="comments-empty">コメントを読み込めませんでした。</p>'; }
  };

  const renderForm = () => {
    if(me){
      cForm.innerHTML = '<div class="comment-form">'
        + '<textarea id="cInput" maxlength="1000" rows="3" placeholder="コメントを書く…"></textarea>'
        + '<div class="comment-form-foot"><button class="comment-submit" id="cSubmit" type="button">投稿する</button></div>'
        + '</div>';
      const inp = document.getElementById("cInput"), btn = document.getElementById("cSubmit");
      btn.addEventListener("click", async () => {
        const text = (inp.value || "").trim();
        if(!text){ inp.focus(); return; }
        btn.disabled = true;
        try{
          await addDoc(col, {
            authorId: me,
            authorName: myName || "ゲスト",
            authorPhotoURL: myPhoto || "",
            text,
            createdAt: serverTimestamp()
          });
          inp.value = "";
          sendNotification({ toUid: articleAuthorId, type: "comment", articleId: id, articleTitle });
          await loadComments();
        }catch(e){ console.error(e); alert("投稿できませんでした。"); }
        finally{ btn.disabled = false; }
      });
    } else {
      cForm.innerHTML = '<p class="comments-login">コメントするには'
        + '<a href="../account.html">ログイン</a>が必要です。</p>';
    }
  };

  onAuthStateChanged(auth, async (user) => {
    me = user ? user.uid : null;
    myName = ""; myPhoto = ""; amAdmin = false;
    if(me){
      try{
        const us = await getDoc(doc(db,"users",me));
        if(us.exists()){ const u = us.data(); myName = u.nickname || ""; myPhoto = u.photoURL || ""; }
      }catch(e){}
      try{ amAdmin = (await getDoc(doc(db,"admins",me))).exists(); }catch(e){ amAdmin = false; }
    }
    renderForm();
    await loadComments();
  });
}

// 記事内ルートマップ：座標を持つ日を訪問順に番号ピンで並べ、線で結ぶ
function initRouteMap(d){
  const el = document.getElementById('routeMap');
  if(!el || typeof L === 'undefined') return;
  const pts = (d.days||[])
    .map((day,i)=>({ n:i+1, lat:day.lat, lng:day.lng, summary:day.summary||'', date:day.date||'' }))
    .filter(p=> typeof p.lat==='number' && typeof p.lng==='number');
  if(!pts.length) return;

  const map = L.map(el, { worldCopyJump:true, scrollWheelZoom:false, minZoom:2 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; OpenStreetMap', maxZoom:18
  }).addTo(map);

  const latlngs = pts.map(p=>[p.lat, p.lng]);
  if(latlngs.length > 1){
    L.polyline(latlngs, { color:'#1f6f5b', weight:3, opacity:.85, dashArray:'6 6' }).addTo(map);
  }
  const esc2 = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  pts.forEach(p=>{
    const icon = L.divIcon({ className:'', html:`<div class="ctpin">${p.n}</div>`, iconSize:[34,34], iconAnchor:[17,17] });
    L.marker([p.lat,p.lng], { icon }).addTo(map)
      .bindPopup(`<strong>DAY ${p.n}${p.date?'・'+esc2(p.date):''}</strong><br>${esc2(p.summary)}`);
  });

  if(latlngs.length > 1){
    map.fitBounds(L.latLngBounds(latlngs).pad(0.25));
  }else{
    map.setView(latlngs[0], 6);
  }
  setTimeout(()=>map.invalidateSize(), 200);
  window.addEventListener('resize', ()=>map.invalidateSize());
}

(async () => {
  if(!id){ showError("記事IDが指定されていません。"); return; }
  try{
    await loadAdminSet();
    const snap = await getDoc(doc(db, "articles", id));
    if(!snap.exists()){ showError("削除されたか、URLが間違っている可能性があります。"); return; }
    const d = snap.data();
    d.id = id;
    if(d.status !== "published"){
      // 公開前でも本人/管理者はルール上読めるが、ここでは注意表示
      console.log("この記事はまだ公開（承認）されていません。status =", d.status);
    }
    // 執筆者の公開プロフィール（アイコン・自己紹介・SNS）を反映
    if(d.authorId){
      try{
        const ps = await getDoc(doc(db, "publicProfiles", d.authorId));
        if(ps.exists()){
          const p = ps.data();
          if(p.nickname) d.authorNickname = p.nickname;
          if(p.photoURL) d.authorPhotoURL = p.photoURL;
          if(p.bio) d.authorBio = p.bio;
          if(p.instagram) d.authorInstagram = p.instagram;
        }
      }catch(e){ console.warn("公開プロフィールの取得に失敗:", e); }
    }
    d.authorIsAdmin = d.authorId ? adminSet.has(d.authorId) : false;
    articleAuthorId = d.authorId || null;
    articleTitle = d.title || "";
    document.title = (d.title || "旅程") + "｜Tabistock";
    root.innerHTML = renderArticleBody(d);
    initInteractions();
    initComments();
    initRouteMap(d);
  }catch(err){
    console.error(err);
    showError("読み込み中にエラーが発生しました。");
  }
})();
