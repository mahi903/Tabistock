const filterOpen = document.getElementById("filterOpen");

if (filterOpen && filterClose && filterDrawer && drawerOverlay) {

    filterDrawer.classList.remove("active");
    drawerOverlay.classList.remove("active");
  });

  drawerOverlay.addEventListener("click", () => {
    filterDrawer.classList.remove("active");
    drawerOverlay.classList.remove("active");
  });
}

const drawerFilterBtns = document.querySelectorAll("#drawer-filter-btn");
drawerFilterBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    const drawer = btn.closest(".filter-drawer");
    const params = new URLSearchParams();

    const keywordInput = drawer.querySelector('input[name="q"]');
    if (keywordInput && keywordInput.value.trim()) {
      params.append("q", keywordInput.value.trim());
    }

    drawer.querySelectorAll("select").forEach(select => {
      if (select.value) {
        params.append(select.name, select.value);
      }
    });

    window.location.href = `../search.html?${params.toString()}`;
  });
});

<script type="module">
import { db, auth } from "../firebase-config.js";
import { doc, getDoc, setDoc, deleteDoc, addDoc, collection, getDocs, query, orderBy, getCountFromServer, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { renderArticleBody, esc, para } from "../tabistock-render.js";

const root = document.getElementById("article-root");
const id = new URLSearchParams(location.search).get("id");

// 管理者UIDの一覧（バッジ表示用・公開読み取り）
const adminSet = new Set();
async function loadAdminSet(){
  try{
    const qs = await getDocs(collection(db, "admins"));
    qs.forEach(s => adminSet.add(s.id));
  }catch(e){ console.warn("管理者リストの取得に失敗:", e); }
}

function showError(msg){
  root.innerHTML = '<div style="padding:140px 6% 200px;text-align:center;color:#6c7787">'
    + '<h1 style="font-size:22px;margin-bottom:10px">記事が見つかりません</h1><p>'+msg+'</p>'
    + '<p style="margin-top:20px"><a href="../search.html" style="color:#1f6f5b;font-weight:700">旅を探す →</a></p></div>';
}

function initInteractions(){
  // ヒーローカルーセルのドット
  const slider = root.querySelector(".hero-images");
  const dots = root.querySelectorAll(".hero-dots span");
  if(slider && dots.length){
    if(dots[0]) dots[0].classList.add("active");
    slider.addEventListener("scroll", () => {
      const index = Math.round(slider.scrollLeft / slider.clientWidth);
      dots.forEach((dot, i) => dot.classList.toggle("active", i === index));
    });
  }
  // DAYカードの開閉（スマホ）
  root.querySelectorAll(".day-card").forEach(card => {
    const toggle = card.querySelector(".day-toggle");
    const icon = card.querySelector(".day-icon");
    if(!toggle || !icon) return;
    toggle.addEventListener("click", () => {
      if(window.innerWidth > 768) return;
      card.classList.toggle("is-open");
      icon.textContent = card.classList.contains("is-open") ? "-" : "+";
    });
  });
  // いいね・共有・フォロー
  const showToast = (m) => {
    const t = document.createElement("div");
    t.className = "tabi-toast"; t.textContent = m;
    document.body.appendChild(t);
    requestAnimationFrame(() => t.classList.add("show"));
    setTimeout(() => { t.classList.remove("show"); setTimeout(() => t.remove(), 300); }, 1800);
  };
  wireLike();
  wireSave();
  const shareBtn = root.querySelector("#shareBtn");
  if(shareBtn){
    shareBtn.addEventListener("click", async () => {
      const data = { title: document.title, url: location.href };
      if(navigator.share){ try{ await navigator.share(data); }catch(e){} }
      else { try{ await navigator.clipboard.writeText(location.href); showToast("リンクをコピーしました"); }catch(e){ showToast("コピーできませんでした"); } }
    });
  }
  wireFollow();
}

// フォロー（Firestore: users/{me}/following/{target} ＋ users/{target}/followers/{me}・要ログイン）
function wireFollow(){
  const btn = root.querySelector("#followBtn");
  if(!btn) return;
  const target = btn.getAttribute("data-uid");
  if(!target){ btn.style.display = "none"; return; }
  let me = null, following = false, busy = false;
  const paint = () => {
    btn.classList.toggle("following", following);
    btn.setAttribute("aria-pressed", following);
    btn.querySelector("span").textContent = following ? "フォロー中" : "フォロー";
    btn.querySelector("i").className = following ? "fa-solid fa-check" : "fa-solid fa-plus";
  };
  onAuthStateChanged(auth, async (user) => {
    me = user ? user.uid : null;
    if(me && me === target){ btn.style.display = "none"; return; } // 自分の記事ではフォロー不要
    btn.style.display = "";
    if(me){ try{ following = (await getDoc(doc(db,"users",me,"following",target))).exists(); }catch(e){ following = false; } }
    else following = false;
    paint();
  });
  btn.addEventListener("click", async () => {
    if(busy) return;
    if(!me){ alert("フォローするにはログインが必要です。"); location.href = "../account.html"; return; }
    busy = true;
    try{
      if(following){
        await deleteDoc(doc(db,"users",me,"following",target));
        await deleteDoc(doc(db,"users",target,"followers",me));
        following = false;
      }else{
        await setDoc(doc(db,"users",me,"following",target), { createdAt: serverTimestamp() });
        await setDoc(doc(db,"users",target,"followers",me), { createdAt: serverTimestamp() });
        following = true;
      }
      paint();
    }catch(e){ console.error(e); }
    finally{ busy = false; }
  });
}

// いいね（Firestore: articles/{id}/likes/{uid}・要ログイン）
function wireLike(){
  const likeBtn = root.querySelector("#likeBtn"), likeCount = root.querySelector("#likeCount");
  if(!likeBtn || !likeCount) return;
  const likesCol = collection(db, "articles", id, "likes");
  let liked = false, uid = null, busy = false;
  const paint = () => {
    likeBtn.classList.toggle("liked", liked);
    likeBtn.setAttribute("aria-pressed", liked);
    likeBtn.querySelector("i").className = liked ? "fa-solid fa-heart" : "fa-regular fa-heart";
  };
  const refreshCount = async () => {
    try{ const c = await getCountFromServer(likesCol); likeCount.textContent = c.data().count; }
    catch(e){ console.warn("いいね数の取得に失敗:", e); }
  };
  refreshCount();
  onAuthStateChanged(auth, async (user) => {
    uid = user ? user.uid : null;
    if(uid){ try{ liked = (await getDoc(doc(db,"articles",id,"likes",uid))).exists(); }catch(e){ liked=false; } }
    else liked = false;
    paint();
  });
  likeBtn.addEventListener("click", async () => {
    if(busy) return;
    if(!uid){ alert("いいねするにはログインが必要です。"); location.href = "../account.html"; return; }
    busy = true;
    try{
      const ref = doc(db,"articles",id,"likes",uid);
      if(liked){ await deleteDoc(ref); liked = false; }
      else { await setDoc(ref, { createdAt: serverTimestamp() }); liked = true; }
      paint();
      await refreshCount();
    }catch(e){ console.error(e); }
    finally{ busy = false; }
  });
}

// 保存（Firestore: users/{uid}/saves/{articleId}・要ログイン）
function wireSave(){

    saveBtn.classList.toggle("saved", saved);
    saveBtn.setAttribute("aria-pressed", saved);
    saveBtn.querySelector("i").className = saved ? "fa-solid fa-bookmark" : "fa-regular fa-bookmark";
    const sp = saveBtn.querySelector("span"); if(sp) sp.textContent = saved ? "保存済み" : "保存";

    uid = user ? user.uid : null;
    if(uid){ try{ saved = (await getDoc(doc(db,"users",uid,"saves",id))).exists(); }catch(e){ saved=false; } }
    else saved = false;
    paint();
  });
  saveBtn.addEventListener("click", async () => {
    if(busy) return;
    if(!uid){ alert("保存するにはログインが必要です。"); location.href = "../account.html"; return; }
    busy = true;
    try{
      const ref = doc(db,"users",uid,"saves",id);
      if(saved){ await deleteDoc(ref); saved = false; }

  });
}

// コメント（Firestore: articles/{id}/comments・閲覧は誰でも／投稿は要ログイン）
function initComments(){
  const section = document.getElementById("comments");
  const cForm = document.getElementById("cForm");
  const cList = document.getElementById("cList");
  const cCount = document.getElementById("cCount");
  if(!section || !cForm || !cList) return;
  section.hidden = false;

  const col = collection(db, "articles", id, "comments");
  const defAvatar = "data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20fill%3D%22%23e7ddcb%22%2F%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2240%22%20r%3D%2218%22%20fill%3D%22%23b9ad95%22%2F%3E%3Cpath%20d%3D%22M20%2086c0-17%2013-28%2030-28s30%2011%2030%2028z%22%20fill%3D%22%23b9ad95%22%2F%3E%3C%2Fsvg%3E";

  let me = null, myName = "", myPhoto = "", amAdmin = false;

  const fmt = (ts) => {
    try{
      const dt = ts && ts.toDate ? ts.toDate() : null;
      if(!dt) return "";
      return dt.getFullYear()+"/"+(dt.getMonth()+1)+"/"+dt.getDate();
    }catch(e){ return ""; }
  };

  const commentHTML = (c) => {
    const canDel = amAdmin || (me && c.authorId === me);
    const photo = c.authorPhotoURL ? esc(c.authorPhotoURL) : defAvatar;
    const badge = adminSet.has(c.authorId) ? ' <i class="fa-solid fa-circle-check admin-badge" title="管理者"></i>' : '';
    const nameTxt = esc(c.authorName || "ゲスト");
    const nameHTML = c.authorId
      ? '<a class="comment-name-link" href="../user.html?uid='+encodeURIComponent(c.authorId)+'">'+nameTxt+'</a>'
      : nameTxt;
    return '<div class="comment" data-cid="'+esc(c.id)+'">'
      + '<img class="comment-avatar" src="'+photo+'" alt="" onerror="this.src=\''+defAvatar+'\'">'
      + '<div class="comment-body">'
      +   '<div class="comment-head">'
      +     '<strong>'+nameHTML+badge+'</strong>'
      +     '<span class="comment-time">'+esc(fmt(c.createdAt))+'</span>'
      +     (canDel ? '<button class="comment-del" type="button" data-del="'+esc(c.id)+'">削除</button>' : '')
      +   '</div>'
      +   '<div class="comment-text">'+para(c.text || "")+'</div>'
      + '</div></div>';
  };

  const loadComments = async () => {
    try{
      const qs = await getDocs(query(col, orderBy("createdAt","desc")));
      const items = [];
      qs.forEach(s => items.push(Object.assign({ id: s.id }, s.data())));
      if(cCount) cCount.textContent = items.length ? "("+items.length+")" : "";
      cList.innerHTML = items.length
        ? items.map(commentHTML).join("")
        : '<p class="comments-empty">まだコメントはありません。最初のコメントを書いてみましょう。</p>';
      cList.querySelectorAll("[data-del]").forEach(btn => {
        btn.addEventListener("click", async () => {
          if(!confirm("このコメントを削除しますか？")) return;
          try{
            await deleteDoc(doc(db,"articles",id,"comments",btn.getAttribute("data-del")));
            await loadComments();
          }catch(e){ console.error(e); alert("削除できませんでした。"); }
        });
      });
    }catch(e){ console.error(e); cList.innerHTML = '<p class="comments-empty">コメントを読み込めませんでした。</p>'; }
  };

  const renderForm = () => {
    if(me){
      cForm.innerHTML = '<div class="comment-form">'
        + '<textarea id="cInput" maxlength="1000" rows="3" placeholder="コメントを書く…"></textarea>'
        + '<div class="comment-form-foot"><button class="comment-submit" id="cSubmit" type="button">投稿する</button></div>'
        + '</div>';
      const inp = document.getElementById("cInput"), btn = document.getElementById("cSubmit");
      btn.addEventListener("click", async () => {
        const text = (inp.value || "").trim();
        if(!text){ inp.focus(); return; }
        btn.disabled = true;
        try{
          await addDoc(col, {
            authorId: me,
            authorName: myName || "ゲスト",
            authorPhotoURL: myPhoto || "",
            text,
            createdAt: serverTimestamp()
          });
          inp.value = "";
          await loadComments();
        }catch(e){ console.error(e); alert("投稿できませんでした。"); }
        finally{ btn.disabled = false; }
      });
    } else {
      cForm.innerHTML = '<p class="comments-login">コメントするには'
        + '<a href="../account.html">ログイン</a>が必要です。</p>';
    }
  };

  onAuthStateChanged(auth, async (user) => {
    me = user ? user.uid : null;
    myName = ""; myPhoto = ""; amAdmin = false;
    if(me){
      try{
        const us = await getDoc(doc(db,"users",me));
        if(us.exists()){ const u = us.data(); myName = u.nickname || ""; myPhoto = u.photoURL || ""; }
      }catch(e){}
      try{ amAdmin = (await getDoc(doc(db,"admins",me))).exists(); }catch(e){ amAdmin = false; }
    }
    renderForm();
    await loadComments();
  });
}

// 記事内ルートマップ：座標を持つ日を訪問順に番号ピンで並べ、線で結ぶ
function initRouteMap(d){
  const el = document.getElementById('routeMap');
  if(!el || typeof L === 'undefined') return;
  const pts = (d.days||[])
    .map((day,i)=>({ n:i+1, lat:day.lat, lng:day.lng, summary:day.summary||'', date:day.date||'' }))
    .filter(p=> typeof p.lat==='number' && typeof p.lng==='number');
  if(!pts.length) return;

  const map = L.map(el, { worldCopyJump:true, scrollWheelZoom:false, minZoom:2 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; OpenStreetMap', maxZoom:18
  }).addTo(map);

  const latlngs = pts.map(p=>[p.lat, p.lng]);
  if(latlngs.length > 1){
    L.polyline(latlngs, { color:'#1f6f5b', weight:3, opacity:.85, dashArray:'6 6' }).addTo(map);
  }
  const esc2 = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  pts.forEach(p=>{
    const icon = L.divIcon({ className:'', html:`<div class="ctpin">${p.n}</div>`, iconSize:[34,34], iconAnchor:[17,17] });
    L.marker([p.lat,p.lng], { icon }).addTo(map)
      .bindPopup(`<strong>DAY ${p.n}${p.date?'・'+esc2(p.date):''}</strong><br>${esc2(p.summary)}`);
  });

  if(latlngs.length > 1){
    map.fitBounds(L.latLngBounds(latlngs).pad(0.25));
  }else{
    map.setView(latlngs[0], 6);
  }
  setTimeout(()=>map.invalidateSize(), 200);
  window.addEventListener('resize', ()=>map.invalidateSize());
}

(async () => {
  if(!id){ showError("記事IDが指定されていません。"); return; }
  try{
    await loadAdminSet();
    const snap = await getDoc(doc(db, "articles", id));
    if(!snap.exists()){ showError("削除されたか、URLが間違っている可能性があります。"); return; }
    const d = snap.data();
    d.id = id;
    if(d.status !== "published"){
      // 公開前でも本人/管理者はルール上読めるが、ここでは注意表示
      console.log("この記事はまだ公開（承認）されていません。status =", d.status);
    }
    // 執筆者の公開プロフィール（アイコン・自己紹介・SNS）を反映
    if(d.authorId){
      try{
        const ps = await getDoc(doc(db, "publicProfiles", d.authorId));
        if(ps.exists()){
          const p = ps.data();
          if(p.nickname) d.authorNickname = p.nickname;
          if(p.photoURL) d.authorPhotoURL = p.photoURL;
          if(p.bio) d.authorBio = p.bio;
          if(p.instagram) d.authorInstagram = p.instagram;
        }
      }catch(e){ console.warn("公開プロフィールの取得に失敗:", e); }
    }
    d.authorIsAdmin = d.authorId ? adminSet.has(d.authorId) : false;
    document.title = (d.title || "旅程") + "｜Tabistock";
    root.innerHTML = renderArticleBody(d);
    initInteractions();
    initComments();
    initRouteMap(d);
  }catch(err){
    console.error(err);
    showError("読み込み中にエラーが発生しました。");
  }
})();
