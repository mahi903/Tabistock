<script>
const filterOpen = document.getElementById("filterOpen");
const filterClose = document.getElementById("filterClose");
const filterDrawer = document.getElementById("filterDrawer");
const drawerOverlay = document.getElementById("drawerOverlay");

console.log(filterOpen, filterClose, filterDrawer, drawerOverlay);

if (filterOpen && filterClose && filterDrawer && drawerOverlay) {
  filterOpen.addEventListener("click", () => {
    filterDrawer.classList.add("active");
    drawerOverlay.classList.add("active");
  });

  filterClose.addEventListener("click", () => {
    filterDrawer.classList.remove("active");
    drawerOverlay.classList.remove("active");
  });

  drawerOverlay.addEventListener("click", () => {
    filterDrawer.classList.remove("active");
    drawerOverlay.classList.remove("active");
  });
}

const drawerFilterBtns = document.querySelectorAll("#drawer-filter-btn");
drawerFilterBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    const drawer = btn.closest(".filter-drawer");
    const params = new URLSearchParams();

    const keywordInput = drawer.querySelector('input[name="q"]');
    if (keywordInput && keywordInput.value.trim()) {
      params.append("q", keywordInput.value.trim());
    }

    drawer.querySelectorAll("select").forEach(select => {
      if (select.value) {
        params.append(select.name, select.value);
      }
    });

    window.location.href = `../search.html?${params.toString()}`;
  });
});
</script>
  <script>
  (function(){
    var hd=document.getElementById('hd');
    if(hd)addEventListener('scroll',function(){hd.classList.toggle('scrolled',scrollY>40)});
    var burger=document.getElementById('burger'),nav=document.getElementById('drawer'),ovl=document.getElementById('ovl'),dc=document.getElementById('dclose');
    if(burger&&nav&&ovl){
      var t=function(o){burger.classList.toggle('open',o);nav.classList.toggle('open',o);ovl.classList.toggle('open',o);document.body.style.overflow=o?'hidden':''};
      burger.addEventListener('click',function(){t(!nav.classList.contains('open'))});
      ovl.addEventListener('click',function(){t(false)});
      if(dc)dc.addEventListener('click',function(){t(false)});
      nav.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){t(false)})});
    }
  })();
  </script>
  <script>
  (function(){
    var dGo=document.getElementById('dGo'),dq=document.getElementById('dq');
    function go(){
      var p=new URLSearchParams();
      if(dq&&dq.value.trim())p.append('q',dq.value.trim());
      ['country','budget','days','style'].forEach(function(k){
        var el=document.getElementById('d-'+k);
        if(el&&el.value)p.append(k,el.value);
      });
      var qs=p.toString();
      window.location.href='../search.html'+(qs?('?'+qs):'');
    }
    if(dGo)dGo.addEventListener('click',go);
    if(dq)dq.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();go();}});
  })();
  </script>

<!-- ===== 記事をFirebaseから読み込んで描画 ===== -->
<script type="module">
import { db } from "../firebase-config.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { renderArticleBody } from "../tabistock-render.js";

const root = document.getElementById("article-root");
const id = new URLSearchParams(location.search).get("id");

function showError(msg){
  root.innerHTML = '<div style="padding:140px 6% 200px;text-align:center;color:#6c7787">'
    + '<h1 style="font-size:22px;margin-bottom:10px">記事が見つかりません</h1><p>'+msg+'</p>'
    + '<p style="margin-top:20px"><a href="../search.html" style="color:#1f6f5b;font-weight:700">旅を探す →</a></p></div>';
}

function initInteractions(){
  // ヒーローカルーセルのドット
  const slider = root.querySelector(".hero-images");
  const dots = root.querySelectorAll(".hero-dots span");
  if(slider && dots.length){
    if(dots[0]) dots[0].classList.add("active");
    slider.addEventListener("scroll", () => {
      const index = Math.round(slider.scrollLeft / slider.clientWidth);
      dots.forEach((dot, i) => dot.classList.toggle("active", i === index));
    });
  }
  // DAYカードの開閉（スマホ）
  root.querySelectorAll(".day-card").forEach(card => {
    const toggle = card.querySelector(".day-toggle");
    const icon = card.querySelector(".day-icon");
    if(!toggle || !icon) return;
    toggle.addEventListener("click", () => {
      if(window.innerWidth > 768) return;
      card.classList.toggle("is-open");
      icon.textContent = card.classList.contains("is-open") ? "-" : "+";
    });
  });
  // いいね・共有・フォロー
  const showToast = (m) => {
    const t = document.createElement("div");
    t.className = "tabi-toast"; t.textContent = m;
    document.body.appendChild(t);
    requestAnimationFrame(() => t.classList.add("show"));
    setTimeout(() => { t.classList.remove("show"); setTimeout(() => t.remove(), 300); }, 1800);
  };
  const likeBtn = root.querySelector("#likeBtn"), likeCount = root.querySelector("#likeCount");
  if(likeBtn && likeCount){
    const lkey = "tabistock_like_" + (id||location.pathname);
    const base = parseInt(likeCount.textContent,10)||0;
    let liked = localStorage.getItem(lkey)==="1";
    const render = () => {
      likeBtn.classList.toggle("liked", liked);
      likeBtn.setAttribute("aria-pressed", liked);
      likeBtn.querySelector("i").className = liked ? "fa-solid fa-heart" : "fa-regular fa-heart";
      likeCount.textContent = base + (liked?1:0);
    };
    render();
    likeBtn.addEventListener("click", () => { liked=!liked; localStorage.setItem(lkey, liked?"1":"0"); render(); });
  }
  const shareBtn = root.querySelector("#shareBtn");
  if(shareBtn){
    shareBtn.addEventListener("click", async () => {
      const data = { title: document.title, url: location.href };
      if(navigator.share){ try{ await navigator.share(data); }catch(e){} }
      else { try{ await navigator.clipboard.writeText(location.href); showToast("リンクをコピーしました"); }catch(e){ showToast("コピーできませんでした"); } }
    });
  }
  const followBtn = root.querySelector("#followBtn");
  if(followBtn){
    const author = followBtn.getAttribute("data-author") || "";
    const fkey = "tabistock_follow_" + author;
    const setFollow = (on) => {
      followBtn.classList.toggle("following", on);
      followBtn.setAttribute("aria-pressed", on);
      followBtn.querySelector("span").textContent = on ? "フォロー中" : "フォロー";
      followBtn.querySelector("i").className = on ? "fa-solid fa-check" : "fa-solid fa-plus";
    };
    setFollow(localStorage.getItem(fkey)==="1");
    followBtn.addEventListener("click", () => {
      const on = !(localStorage.getItem(fkey)==="1");
      localStorage.setItem(fkey, on?"1":"0"); setFollow(on);
    });
  }
}

(async () => {
  if(!id){ showError("記事IDが指定されていません。"); return; }
  try{
    const snap = await getDoc(doc(db, "articles", id));
    if(!snap.exists()){ showError("削除されたか、URLが間違っている可能性があります。"); return; }
    const d = snap.data();
    d.id = id;
    if(d.status !== "published"){
      // 公開前でも本人/管理者はルール上読めるが、ここでは注意表示
      console.log("この記事はまだ公開（承認）されていません。status =", d.status);
    }
    document.title = (d.title || "旅程") + "｜Tabistock";
    root.innerHTML = renderArticleBody(d);
    const fb = root.querySelector("#followBtn");
    if(fb) fb.setAttribute("data-author", d.authorNickname || "");
    initInteractions();
  }catch(err){
    console.error(err);
    showError("読み込み中にエラーが発生しました。");
  }
})();
</script>
