    .ask-form button{flex-shrink:0;align-self:flex-end;border:none;border-radius:14px;padding:14px 24px;background:#fff;color:#1f6f5b;font-weight:800;font-size:15px;cursor:pointer;white-space:nowrap}

    .ask-result{max-width:860px;margin:0 auto;background:#fff;border:1px solid #e7ddcb;border-radius:18px;padding:22px 22px;box-shadow:0 10px 30px rgba(20,30,25,.06)}

    .ask-answer{font-size:15px;line-height:1.9;color:#283142}
    .ask-answer a{color:#1f6f5b;font-weight:700}
    .ask-refs{margin-top:18px;display:flex;flex-direction:column;gap:9px}

    .ask-ref{display:flex;align-items:center;gap:11px;text-decoration:none;background:#f4f0e7;border:1px solid #e7ddcb;border-radius:12px;padding:12px 15px;color:#283142}

  <script>
  (function(){
    var hd=document.getElementById('hd');
    if(hd)addEventListener('scroll',function(){hd.classList.toggle('scrolled',scrollY>40)});
    var burger=document.getElementById('burger'),nav=document.getElementById('drawer'),ovl=document.getElementById('ovl'),dc=document.getElementById('dclose');
    if(burger&&nav&&ovl){
      var t=function(o){burger.classList.toggle('open',o);nav.classList.toggle('open',o);ovl.classList.toggle('open',o);document.body.style.overflow=o?'hidden':''};
      burger.addEventListener('click',function(){t(!nav.classList.contains('open'))});
      ovl.addEventListener('click',function(){t(false)});
      if(dc)dc.addEventListener('click',function(){t(false)});
      nav.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){t(false)})});
    }
  })();
  </script>
  <script>
  (function(){
    var dGo=document.getElementById('dGo'),dq=document.getElementById('dq');
    function go(){
      var p=new URLSearchParams();
      if(dq&&dq.value.trim())p.append('q',dq.value.trim());
      ['country','budget','days','style'].forEach(function(k){
        var el=document.getElementById('d-'+k);
        if(el&&el.value)p.append(k,el.value);
      });
      var qs=p.toString();
      window.location.href='search.html'+(qs?('?'+qs):'');
    }
    if(dGo)dGo.addEventListener('click',go);
    if(dq)dq.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();go();}});
  })();
  </script>
  <!-- AIに相談：公開記事をAIが読んで質問に答える（/api/ask） -->
  <script type="module">
    import { auth } from "./firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    // ログイン状態の初回復元を待つ（読み込み直後は currentUser が null のことがあるため）
    let authReady = false;
    const whenAuthReady = new Promise((resolve) => {
      const un = onAuthStateChanged(auth, (u) => { authReady = true; un(); resolve(u); });
    });
    const input = document.getElementById("askInput");
    const btn = document.getElementById("askBtn");
    const result = document.getElementById("askResult");
    const answerEl = document.getElementById("askAnswer");
    const refsEl = document.getElementById("askRefs");
    const chips = document.getElementById("askChips");
    const esc = s => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

    async function ask() {
      const q = (input.value || "").trim();
      if (!q) { input.focus(); return; }
      result.hidden = false;
      refsEl.innerHTML = "";
      result.scrollIntoView({ behavior: "smooth", block: "nearest" });
      const user = authReady ? auth.currentUser : await whenAuthReady;
      if (!user) {
        answerEl.innerHTML = `相談機能を使うにはログインが必要です。<a href="account.html">ログイン / 新規登録はこちら</a>`;
        return;
      }
      btn.disabled = true;
      const old = btn.textContent;
      btn.textContent = "考え中…";
      answerEl.textContent = "AIが旅程記事を読んでいます…";
      try {
        const idToken = await user.getIdToken();
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "content-type": "application/json", "authorization": "Bearer " + idToken },
          body: JSON.stringify({ question: q })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "failed");
        answerEl.innerHTML = esc(data.answer).replace(/\n/g, "<br>");
        const refs = data.articles || [];
        if (refs.length) {
          refsEl.innerHTML = `<p class="ask-refs-title">詳しくはこちらの記事を参考に</p>` +
            refs.map(a =>
              `<a class="ask-ref" href="./articles/view.html?id=${esc(a.id)}">` +
              (a.country ? `<span class="ask-ref-ct">${esc(a.country)}</span>` : "") +
              `<span class="ask-ref-tt">${esc(a.title)}</span>` +
              `<span class="ask-ref-ar">→</span></a>`
            ).join("");
        }
      } catch (e) {
        answerEl.textContent = "うまく相談できませんでした。少し時間をおいて、もう一度お試しください。";
        refsEl.innerHTML = "";
      } finally {
        btn.disabled = false;
        btn.textContent = old;
      }
    }
    if (btn) btn.addEventListener("click", ask);
    if (input) input.addEventListener("keydown", e => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); ask(); }
    });
    if (chips) chips.addEventListener("click", e => {
      const c = e.target.closest(".ask-chip");
      if (!c) return;
      input.value = c.textContent.trim();
      ask();
    });
  </script>
